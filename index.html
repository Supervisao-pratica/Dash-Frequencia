        const isOrangeFont = (hex) => {
            if (!hex || typeof hex !== 'string') return false;
            let cleanHex = hex.replace('#', '').toUpperCase();
            if (cleanHex.length === 8) cleanHex = cleanHex.substring(2); 
            if (cleanHex.length !== 6) return false;

            const knownOranges = ['ED7D31', 'F4B084', 'C65911', '833C0C', 'FFC000', 'FFA500', 'FF9900', 'FF6600', 'E26B0A', 'F8CBAD', 'D9D9D9'];
            if (knownOranges.includes(cleanHex)) return true;

            const r = parseInt(cleanHex.substring(0, 2), 16);
            const g = parseInt(cleanHex.substring(2, 4), 16);
            const b = parseInt(cleanHex.substring(4, 6), 16);

            if (r < 130) return false; 
            if (b > 150 && b > r * 0.8) return false; 
            const greenRatio = g / r;
            if (greenRatio < 0.20) return false; 
            if (greenRatio > 0.85) return false; 
            return true;
        };

        // --- DADOS DEMO ---
        const DEMO_DATA = {

        const ProgressBar = ({ value, label }) => {
            let colorClass = "bg-green-500";
            if (value < 60) colorClass = "bg-red-500";
            else if (value < 75) colorClass = "bg-yellow-500";
            return (
                <div className="w-full">
                    {label && <div className="flex justify-between text-xs mb-1"><span className="text-gray-500">{label}</span></div>}
                    <div className="bg-gray-200 rounded-full h-2.5">
                        <div className={`h-2.5 rounded-full ${colorClass} transition-all duration-500 ease-out`} style={{ width: `${value}%` }}></div>
                    </div>
                </div>
            );
        };

        const DonutChart = ({ data, size = 120 }) => {
            const total = data.reduce((acc, curr) => acc + curr.value, 0);
            let cumulativeAngle = 0;
            if (total === 0) return <div className="text-xs text-gray-400">Sem dados</div>;
            return (
                <div className="relative flex items-center justify-center" style={{ width: size, height: size }}>
                    <svg viewBox="0 0 100 100" className="transform -rotate-90 w-full h-full">
                        {data.map((slice, i) => {
                            if (slice.value === 0) return null;
                            const percentage = slice.value / total;
                            const angle = percentage * 360;
                            const x1 = 50 + 40 * Math.cos(Math.PI * cumulativeAngle / 180);
                            const y1 = 50 + 40 * Math.sin(Math.PI * cumulativeAngle / 180);
                            const x2 = 50 + 40 * Math.cos(Math.PI * (cumulativeAngle + angle) / 180);
                            const y2 = 50 + 40 * Math.sin(Math.PI * (cumulativeAngle + angle) / 180);
                            const d = total === slice.value 
                                ? "M 50 10 a 40 40 0 1 0 0.0001 0" 
                                : `M 50 50 L ${x1} ${y1} A 40 40 0 ${angle > 180 ? 1 : 0} 1 ${x2} ${y2} Z`;
                            const path = <path key={i} d={d} fill={slice.color} stroke="white" strokeWidth="2" />;
                            cumulativeAngle += angle;
                            return path;
                        })}
                        <circle cx="50" cy="50" r="25" fill="white" />
                    </svg>
                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                        <span className="text-xs font-bold text-gray-400">Total</span>
                        <span className="text-lg font-bold text-gray-700">{total}</span>
                    </div>
                </div>
            );
        };

        const DashboardCharts = ({ stats, context }) => {
            if (!stats) return null;
            const chartData = [

                { label: 'Recuperação', value: stats.failed, color: '#dc2626' },    
                { label: 'Conselho', value: stats.warning, color: '#ca8a04' },      
                { label: 'Evasão', value: stats.dropout, color: '#f97316' },
                { label: 'Em Processo', value: stats.process, color: '#9333ea' }         
            ];
            return (
                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8 flex flex-col md:flex-row items-center justify-between gap-8 animate-fade-in">

                        </h3>
                        <p className="text-sm text-gray-500">Visão geral {context === 'all' ? "de todas as UCs." : `específica da ${context}.`}</p>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4 mt-4">
                            {chartData.map((item, i) => (
                                <div key={i} className="flex items-center gap-2">
                                    <div className="w-3 h-3 rounded-full" style={{ backgroundColor: item.color }}></div>
                                    <span className="text-sm text-gray-600 font-medium">{item.label}: <span className="text-gray-900 font-bold">{item.value}</span></span>
                                </div>
                            ))}

                    </div>
                    <div className="flex-shrink-0"><DonutChart data={chartData} size={160} /></div>
                </div>
            );

        // --- COMPONENTES AUXILIARES ---
        const SignatureCanvas = ({ onSave, onCancel }) => {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            
            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000000';
                
                const rect = canvas.getBoundingClientRect();
                canvas.width = rect.width * 2;
                canvas.height = rect.height * 2;
                ctx.scale(2, 2);
            }, []);

            const getPos = (e) => {
                const canvas = canvasRef.current;
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const startDrawing = (e) => {
                setIsDrawing(true);
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const pos = getPos(e);
                const ctx = canvasRef.current.getContext('2d');
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const stopDrawing = () => setIsDrawing(false);

            const handleClear = () => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.beginPath();
            };

            const handleSave = () => onSave(canvasRef.current.toDataURL());

            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4 animate-fade-in">
                    <div className="bg-white rounded-xl shadow-2xl overflow-hidden w-full max-w-lg flex flex-col">
                        <div className="bg-gray-800 p-3 text-white flex justify-between items-center">
                            <h4 className="font-bold text-sm flex items-center gap-2"><IconPenTool className="w-4 h-4"/> Assinar na Tela</h4>
                            <button onClick={onCancel}><IconXCircle className="w-5 h-5 hover:text-red-400"/></button>
                        </div>
                        <div className="p-4 bg-gray-100 flex-1 flex justify-center">
                            <div className="border-2 border-dashed border-gray-400 bg-white shadow-inner cursor-crosshair rounded">
                                <canvas ref={canvasRef} style={{ width: '100%', height: '200px', touchAction: 'none' }} className="w-full h-[200px]"
                                    onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing}
                                    onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing}></canvas>
                            </div>
                        </div>
                        <div className="p-3 bg-white border-t flex justify-between gap-3">
                            <button onClick={handleClear} className="text-red-500 text-xs font-bold hover:underline flex items-center gap-1"><IconTrash2 className="w-3 h-3"/> Limpar</button>
                            <div className="flex gap-2">
                                <button onClick={onCancel} className="px-3 py-1.5 text-xs font-bold text-gray-500 hover:bg-gray-100 rounded">Cancelar</button>
                                <button onClick={handleSave} className="px-4 py-1.5 text-xs font-bold text-white bg-senac-blue hover:bg-blue-700 rounded shadow">Salvar Assinatura</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SignatureUploader = ({ label, name, cpf, matricula, rubricaSrc, onChangeName, onChangeCPF, onChangeMatricula, onSetRubrica }) => {
            const [showCanvas, setShowCanvas] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);

            const processImage = (fileOrDataUrl) => {
                setIsProcessing(true);
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    const imageData = ctx.getImageData(0, 0, width, height);
                    const data = imageData.data;
                    let minX = width, minY = height, maxX = 0, maxY = 0;
                    let found = false;
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const i = (y * width + x) * 4;
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r < 240 || g < 240 || b < 240) {
                                if (x < minX) minX = x;
                                if (x > maxX) maxX = x;
                                if (y < minY) minY = y;
                                if (y > maxY) maxY = y;
                                found = true;
                            }
                        }
                    }
                    if (found) {
                        const padding = 10;
                        minX = Math.max(0, minX - padding);
                        minY = Math.max(0, minY - padding);
                        maxX = Math.min(width, maxX + padding);
                        maxY = Math.min(height, maxY + padding);
                        const cropWidth = maxX - minX;
                        const cropHeight = maxY - minY;
                        const cutCanvas = document.createElement('canvas');
                        cutCanvas.width = cropWidth;
                        cutCanvas.height = cropHeight;
                        const cutCtx = cutCanvas.getContext('2d');
                        cutCtx.drawImage(canvas, minX, minY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);
                        const cutImageData = cutCtx.getImageData(0, 0, cropWidth, cropHeight);
                        const cutData = cutImageData.data;
                        for (let i = 0; i < cutData.length; i += 4) {
                            const r = cutData[i], g = cutData[i + 1], b = cutData[i + 2];
                            if (r > 200 && g > 200 && b > 200) { cutData[i + 3] = 0; }
                        }
                        cutCtx.putImageData(cutImageData, 0, 0);
                        onSetRubrica(cutCanvas.toDataURL());
                    } else {
                        onSetRubrica(canvas.toDataURL());
                    }
                    setIsProcessing(false);
                };
                if (typeof fileOrDataUrl === 'string') { img.src = fileOrDataUrl; } else { const reader = new FileReader(); reader.onload = (e) => { img.src = e.target.result; }; reader.readAsDataURL(fileOrDataUrl); }
            };

            const handleFile = (e) => { if(e.target.files[0]) processImage(e.target.files[0]); };

            return (
                <div className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm relative">
                    {showCanvas && (<SignatureCanvas onSave={(dataUrl) => { onSetRubrica(dataUrl); setShowCanvas(false); }} onCancel={() => setShowCanvas(false)} />)}
                    
                    <div className="flex justify-between items-center mb-2">
                        <label className="text-xs font-bold text-senac-blue">{label}</label>
                        <div className="flex gap-2">
                            <button onClick={() => setShowCanvas(true)} className="text-[10px] bg-blue-50 text-blue-600 px-2 py-0.5 rounded hover:bg-blue-100 flex items-center gap-1 border border-blue-200" title="Assinar com Mouse/Dedo"><IconEdit3 className="w-3 h-3"/> Assinar na Tela</button>
                            <label className="cursor-pointer text-[10px] bg-gray-50 text-gray-600 px-2 py-0.5 rounded hover:bg-gray-100 flex items-center gap-1 border border-gray-200" title="Upload Foto"><IconUploadCloud className="w-3 h-3"/> Foto<input type="file" className="hidden" accept="image/*" onChange={handleFile} /></label>
                        </div>
                    </div>
                    <input type="text" value={name} onChange={(e) => onChangeName(e.target.value)} placeholder="Nome Completo (Editável)" className="w-full px-2 py-1.5 rounded border mb-2 text-xs bg-gray-50 focus:bg-white transition-colors" />
                    <div className="flex gap-2 mb-2">
                        <input type="text" value={cpf} onChange={(e) => onChangeCPF(e.target.value)} placeholder="CPF" className="w-1/2 px-2 py-1.5 rounded border text-xs font-mono" maxLength="14" />
                        <input type="text" value={matricula} onChange={(e) => onChangeMatricula(e.target.value)} placeholder="Matrícula" className="w-1/2 px-2 py-1.5 rounded border text-xs font-mono" />
                    </div>
                    {isProcessing && <div className="text-[10px] text-orange-500 italic animate-pulse">Processando imagem...</div>}
                    {rubricaSrc && !isProcessing && (
                        <div className="mt-2 p-2 border border-dashed border-gray-300 rounded bg-gray-50 flex items-center justify-between">
                            <div className="flex items-center gap-2"><img src={rubricaSrc} alt="Preview" className="h-8 max-w-[100px] object-contain" /><span className="text-[10px] text-green-600 font-bold flex items-center gap-1"><IconCheckCircle className="w-3 h-3"/> OK</span></div>
                            <button onClick={() => onSetRubrica(null)} className="text-red-400 hover:text-red-600 p-1"><IconTrash2 className="w-3 h-3"/></button>
                        </div>
                    )}
                </div>
            );
        };

        const NOTEBOOK_SITUATION_OPTIONS = [
            { group: "Acompanhamento Pedagógico", options: [
                { value: "Desempenho Insuficiente", label: "Desempenho Insuficiente" },
                { value: "Faltas Excessivas", label: "Faltas Excessivas" },
                { value: "Feedback", label: "Feedback / Orientação" },
                { value: "Elogios", label: "Elogios / Destaque" }
            ]},
            { group: "Justificativas e Documentos", options: [
                { value: "Atestado", label: "Atestado Médico" },
                { value: "Declaracao", label: "Declaração de Trabalho" },
                { value: "Afastamento", label: "Afastamento INSS/Licença" },
                { value: "Militar", label: "Serviço Militar" },
                { value: "Gestacao", label: "Gestação/Maternidade" }
            ]},
            { group: "Outros", options: [{ value: "Outros", label: "Outros" }] }
        ];

        const NOTEBOOK_STORAGE_PREFIX = "instructor_notes_v3_";

        const cleanNotebookKey = (value, fallback) => {
            const cleaned = String(value || "").normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "");
            return cleaned || fallback;
        };

        const makeNotebookStorageKey = (turma, instructorName) => `${NOTEBOOK_STORAGE_PREFIX}${cleanNotebookKey(turma, "TURMA_DESCONHECIDA")}_${cleanNotebookKey(instructorName, "INSTRUTOR")}`;

        const normalizeNotebookNote = (note) => {
            if (!note || typeof note !== "object") return null;
            const situations = Array.isArray(note.situationTypes)
                ? note.situationTypes.filter(Boolean)
                : (note.situationType ? [note.situationType] : []);
            const isClassNote = note.scope === "class" || note.studentId === null || note.studentId === undefined && !note.studentName;
            return {
                ...note,
                id: String(note.id || `note_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`),
                scope: isClassNote ? "class" : "student",
                studentId: isClassNote ? null : (note.studentId === null || note.studentId === undefined ? null : Number(note.studentId)),
                studentIds: Array.isArray(note.studentIds) ? note.studentIds.map(Number).filter(Number.isFinite) : [],
                studentName: isClassNote ? "Turma toda" : (note.studentName || "Aluno não identificado"),
                situationTypes: situations,
                situationType: situations.join(", "),
                attachments: Array.isArray(note.attachments) ? note.attachments : [],
                notes: String(note.notes || "")
            };
        };

        const readNotebookNotesLocal = (storageKey) => {
            try {
                const saved = localStorage.getItem(storageKey);
                if (!saved) return [];
                const parsed = JSON.parse(saved);
                const oldFormat = parsed && !Array.isArray(parsed) && parsed.notes ? [{
                    ...parsed,
                    id: `legacy_${storageKey}`,
                    date: new Date().toISOString(),
                    scope: "class",
                    studentId: null,
                    studentName: "Turma toda"
                }] : parsed;
                return Array.isArray(oldFormat) ? oldFormat.map(normalizeNotebookNote).filter(Boolean) : [];
            } catch (error) {
                console.error("Erro ao carregar notas locais", error);
                return [];
            }
        };

        const writeNotebookNotesLocal = (storageKey, notes) => {
            try { localStorage.setItem(storageKey, JSON.stringify(notes)); } catch (error) { console.error("Erro ao salvar notas locais", error); }
        };

        const getNotebookFirestore = async () => {
            try {
                const config = window.SENAC_FIREBASE_CONFIG;
                if (!config || !config.projectId || !window.firebase || !firebase.firestore) return null;
                if (!firebase.apps.length) firebase.initializeApp(config);
                const currentUser = firebase.auth ? firebase.auth().currentUser : null;
                const allowedDomains = Array.isArray(config.allowedEmailDomains) ? config.allowedEmailDomains : [config.allowedEmailDomain || "@pr.senac.br"];
                const email = String(currentUser && currentUser.email || "").toLowerCase();
                if (!currentUser || !allowedDomains.some(domain => email.endsWith(String(domain).toLowerCase()))) return null;
                return firebase.firestore();
            } catch (error) {
                console.error("Firebase indisponível; usando armazenamento local", error);
                return null;
            }
        };

        const loadNotebookNotes = async (turma, instructorName) => {
            const storageKey = makeNotebookStorageKey(turma, instructorName);
            const legacyKey = `instructor_notes_v2_${cleanNotebookKey(turma, "TURMA_DESCONHECIDA")}_${cleanNotebookKey(instructorName, "INSTRUTOR")}`;
            const localMap = new Map();
            [...readNotebookNotesLocal(legacyKey), ...readNotebookNotesLocal(storageKey)].forEach(note => localMap.set(String(note.id), note));
            const localNotes = Array.from(localMap.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
            if (localNotes.length > 0) {
                writeNotebookNotesLocal(storageKey, localNotes);
                try { localStorage.removeItem(legacyKey); } catch (error) { /* migração local não impede o uso */ }
            }
            const db = await getNotebookFirestore();
            if (!db) return { notes: localNotes, source: "local" };

            try {
                const turmaKey = cleanNotebookKey(turma, "TURMA_DESCONHECIDA");
                const instructorKey = cleanNotebookKey(instructorName, "INSTRUTOR");
                const snapshot = await db.collection("instructor_notes")
                    .where("turmaKey", "==", turmaKey)
                    .where("instructorKey", "==", instructorKey)
                    .get();
                const cloudNotes = snapshot.docs.map(doc => normalizeNotebookNote({ id: doc.id, ...doc.data() })).filter(Boolean);
                const merged = new Map(localNotes.map(note => [String(note.id), note]));
                cloudNotes.forEach(note => merged.set(String(note.id), note));
                const notes = Array.from(merged.values()).sort((a, b) => new Date(b.date) - new Date(a.date));
                writeNotebookNotesLocal(storageKey, notes);
                return { notes, source: "cloud" };
            } catch (error) {
                console.error("Erro ao carregar notas do Firebase; usando notas locais", error);
                return { notes: localNotes, source: "local" };
            }
        };

        const persistNotebookNote = async (turma, instructorName, note) => {
            const storageKey = makeNotebookStorageKey(turma, instructorName);
            const notes = [normalizeNotebookNote(note), ...readNotebookNotesLocal(storageKey)].filter(Boolean);
            writeNotebookNotesLocal(storageKey, notes);
            const db = await getNotebookFirestore();
            if (!db) return { source: "local" };
            try {
                await db.collection("instructor_notes").doc(String(note.id)).set({
                    ...normalizeNotebookNote(note),
                    turmaKey: cleanNotebookKey(turma, "TURMA_DESCONHECIDA"),
                    instructorKey: cleanNotebookKey(instructorName, "INSTRUTOR")
                });
                return { source: "cloud" };
            } catch (error) {
                console.error("Erro ao salvar nota no Firebase; nota mantida localmente", error);
                return { source: "local" };
            }
        };

        const removeNotebookNote = async (turma, instructorName, noteId) => {
            const storageKey = makeNotebookStorageKey(turma, instructorName);
            const notes = readNotebookNotesLocal(storageKey).filter(note => String(note.id) !== String(noteId));
            writeNotebookNotesLocal(storageKey, notes);
            const db = await getNotebookFirestore();
            if (!db) return { source: "local" };
            try {
                await db.collection("instructor_notes").doc(String(noteId)).delete();
                return { source: "cloud" };
            } catch (error) {
                console.error("Erro ao excluir nota do Firebase", error);
                return { source: "local" };
            }
        };

        const getNotebookSituationLabel = (note) => {
            const types = Array.isArray(note.situationTypes) && note.situationTypes.length > 0 ? note.situationTypes : (note.situationType ? [note.situationType] : []);
            return types.length > 0 ? types.join(", ") : "Anotação Geral";
        };

        // --- COMPONENTE CADERNO DO INSTRUTOR (V77 - TURMA E MÚLTIPLAS SITUAÇÕES) ---
        const InstructorNotebook = ({ instructorName, turma, students, onClose }) => {
            const [targetScope, setTargetScope] = useState("student");
            const [selectedStudentId, setSelectedStudentId] = useState("");
            const [notes, setNotes] = useState("");
            const [urgency, setUrgency] = useState("normal"); 
            const [selectedSituationTypes, setSelectedSituationTypes] = useState([]);
            const [situationDate, setSituationDate] = useState("");
            const [attachments, setAttachments] = useState([]);
            const [allNotes, setAllNotes] = useState([]); // Histórico de notas
            const [isSaving, setIsSaving] = useState(false);
            const [storageSource, setStorageSource] = useState("local");

            const storageKey = useMemo(() => makeNotebookStorageKey(turma, instructorName), [turma, instructorName]);

            useEffect(() => {
                let isCurrent = true;
                (async () => {
                    const loaded = await loadNotebookNotes(turma, instructorName);
                    if (isCurrent) {
                        setAllNotes(loaded.notes);
                        setStorageSource(loaded.source);
                    }
                })();
                return () => { isCurrent = false; };
            }, [storageKey, turma, instructorName]);

            const toggleSituation = (value) => {
                setSelectedSituationTypes(current => current.includes(value) ? current.filter(item => item !== value) : [...current, value]);
            };

            const handleSave = async () => {
                if (targetScope === "student" && !selectedStudentId) {
                    alert("Selecione um aluno ou altere o alcance para Turma toda.");
                    return;
                }
                if (!notes.trim() && selectedSituationTypes.length === 0) {
                    alert("Informe uma anotação ou selecione pelo menos uma Situação Específica.");
                    return;
                }
                setIsSaving(true);
                const selectedStudent = students.find(s => s.id === parseInt(selectedStudentId));
                const newNote = {
                    id: `note_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
                    date: new Date().toISOString(),
                    scope: targetScope,
                    studentId: targetScope === "student" ? parseInt(selectedStudentId) : null,
                    studentIds: targetScope === "class" ? students.map(s => s.id) : [parseInt(selectedStudentId)],
                    studentName: targetScope === "class" ? "Turma toda" : (selectedStudent?.name || "Aluno não identificado"),
                    notes,
                    urgency,
                    situationTypes: selectedSituationTypes,
                    situationType: selectedSituationTypes.join(", "),
                    situationDate,
                    attachments,
                    turma,
                    instructorName
                };

                const updatedNotes = [normalizeNotebookNote(newNote), ...allNotes].filter(Boolean);
                setAllNotes(updatedNotes);
                const saved = await persistNotebookNote(turma, instructorName, newNote);
                setStorageSource(saved.source);

                // Reset fields
                setNotes("");
                setSelectedSituationTypes([]);
                setSituationDate("");
                setAttachments([]);

                setTimeout(() => setIsSaving(false), 800);
            };

            const handleSendEmail = () => {
                if (!notes && selectedSituationTypes.length === 0) {
                    alert("Preencha pelo menos o tipo de ocorrência ou uma anotação para enviar.");
                    return;
                }
                const studentName = targetScope === "class" ? "Turma toda" : students.find(s => s.id === parseInt(selectedStudentId))?.name || "Nenhum aluno selecionado";
                const situationLabel = selectedSituationTypes.join(", ") || "Anotação";
                const subject = `Ocorrência: ${situationLabel} - Turma ${turma}`;
                
                let body = `Olá,\n\nSegue registro de ocorrência:\n\n`;
                body += `Turma: ${turma}\n`;
                body += `Instrutor: ${instructorName}\n`;
                body += `Aluno: ${studentName}\n`;
                body += `Data Ocorrência: ${situationDate || "N/A"}\n`;
                body += `Urgência: ${urgency.toUpperCase()}\n`;
                body += `Tipo(s): ${situationLabel}\n\n`;
                body += `Detalhes:\n${notes}\n\n`;
                
                // NOTA SOBRE ANEXOS (V75 - AJUSTE DE SEGURANÇA)
                if (attachments.length > 0) {
                    body += `\n[NOTA DO SISTEMA: Esta ocorrência possui ${attachments.length} anexo(s) registrado(s) no sistema. Lembre-se de anexá-los manualmente a este e-mail.]\n\n`;
                }

                body += `Enviado via Dashboard de Frequência.`;

                const mailtoLink = `mailto:?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                window.location.href = mailtoLink;

                if (attachments.length > 0) {
                    alert("⚠️ AVISO DE SEGURANÇA:\n\nDevido a restrições técnicas dos navegadores web, arquivos NÃO podem ser anexados automaticamente ao programa de e-mail.\n\nO texto do e-mail foi gerado, mas você deve ARRASTAR OS ARQUIVOS MANUALMENTE para o e-mail.");
                }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 500000) { alert("Limite de 500KB por arquivo."); return; }
                const reader = new FileReader();
                reader.onload = () => {
                    setAttachments(prev => [...prev, { name: file.name, data: reader.result, type: file.type }]);
                };
                reader.readAsDataURL(file);
            };

            const removeAttachment = (idx) => {
                setAttachments(prev => prev.filter((_, i) => i !== idx));
            };

            const deleteNote = (id) => {
                if(confirm("Excluir esta anotação do histórico?")) {
                    const updated = allNotes.filter(n => n.id !== id);
                    setAllNotes(updated);
                    removeNotebookNote(turma, instructorName, id).then(result => setStorageSource(result.source));
                }
            }

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-fade-in" onClick={(e) => {if(e.target===e.currentTarget) onClose()}}>
                    <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="bg-senac-blue p-4 text-white flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold flex items-center gap-2"><IconBookOpen className="w-6 h-6"/> Caderno do Instrutor</h2>
                            <button onClick={onClose} className="hover:bg-white/20 p-1 rounded-full"><IconXCircle className="w-6 h-6"/></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto bg-gray-50 custom-scrollbar">
                            <div className="mb-4">
                                <h3 className="text-lg font-bold text-gray-800">{instructorName}</h3>
                                <p className="text-sm text-gray-500">Nova anotação para a turma {turma}</p>
                                <p className={`text-xs mt-1 font-medium ${storageSource === 'cloud' ? 'text-green-700' : 'text-gray-500'}`}>
                                    {storageSource === 'cloud' ? 'Salvo no Firebase e neste dispositivo' : 'Salvo neste dispositivo'}
                                </p>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-4">
                                <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Alcance da anotação</label>
                                <div className="grid grid-cols-2 gap-2 mb-3" role="radiogroup" aria-label="Alcance da anotação">
                                    <button type="button" onClick={() => setTargetScope('student')} className={`py-2 px-3 rounded-lg text-sm font-bold border transition-colors ${targetScope === 'student' ? 'bg-blue-50 text-senac-blue border-senac-blue ring-2 ring-blue-100' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}>
                                        <IconUser className="w-4 h-4 inline-block mr-1" /> Aluno específico
                                    </button>
                                    <button type="button" onClick={() => setTargetScope('class')} className={`py-2 px-3 rounded-lg text-sm font-bold border transition-colors ${targetScope === 'class' ? 'bg-orange-50 text-senac-orange border-senac-orange ring-2 ring-orange-100' : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'}`}>
                                        <IconUsers className="w-4 h-4 inline-block mr-1" /> Turma toda
                                    </button>
                                </div>
                                {targetScope === 'student' ? (
                                    <select
                                        value={selectedStudentId}
                                        onChange={(e) => setSelectedStudentId(e.target.value)}
                                        className="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-senac-blue outline-none"
                                    >
                                        <option value="">-- Selecione um aluno --</option>
                                        {students.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                ) : (
                                    <div className="rounded-lg bg-orange-50 border border-orange-200 px-3 py-2 text-sm text-orange-800 flex items-center gap-2">
                                        <IconUsers className="w-4 h-4 shrink-0" /> Esta anotação será vinculada a todos os alunos da turma.
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Nível de Urgência</label>
                                    <div className="flex gap-2">
                                        <button onClick={() => setUrgency('normal')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${urgency === 'normal' ? 'bg-green-100 text-green-700 border-green-300 ring-2 ring-green-200' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}>Normal</button>
                                        <button onClick={() => setUrgency('warning')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${urgency === 'warning' ? 'bg-yellow-100 text-yellow-700 border-yellow-300 ring-2 ring-yellow-200' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}>Atenção</button>
                                        <button onClick={() => setUrgency('critical')} className={`flex-1 py-2 rounded-lg text-xs font-bold border ${urgency === 'critical' ? 'bg-red-100 text-red-700 border-red-300 ring-2 ring-red-200' : 'bg-gray-50 text-gray-400 border-gray-200 hover:bg-gray-100'}`}>Crítico</button>
                                    </div>
                                </div>

                                <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                    <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Situação Específica</label>
                                    <div className="max-h-40 overflow-y-auto border border-gray-200 rounded-lg p-2 space-y-2 bg-gray-50">
                                        {NOTEBOOK_SITUATION_OPTIONS.map(group => (
                                            <div key={group.group}>
                                                <div className="text-[10px] font-bold text-gray-400 uppercase px-1 mb-1">{group.group}</div>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-1">
                                                    {group.options.map(option => (
                                                        <label key={option.value} className={`flex items-center gap-2 px-2 py-1.5 rounded cursor-pointer text-xs ${selectedSituationTypes.includes(option.value) ? 'bg-blue-100 text-blue-800 font-semibold' : 'hover:bg-white text-gray-600'}`}>
                                                            <input type="checkbox" checked={selectedSituationTypes.includes(option.value)} onChange={() => toggleSituation(option.value)} className="rounded text-senac-blue focus:ring-senac-blue" />
                                                            <span>{option.label}</span>
                                                        </label>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-2 text-xs text-gray-500 min-h-4">
                                        {selectedSituationTypes.length > 0 ? `${selectedSituationTypes.length} assunto(s) selecionado(s): ${selectedSituationTypes.join(', ')}` : 'Selecione um ou mais assuntos.'}
                                    </div>
                                    {selectedSituationTypes.length > 0 && (
                                        <input type="date" value={situationDate} onChange={(e) => setSituationDate(e.target.value)} className="w-full p-2 border border-gray-300 rounded text-sm" title="Data do Ocorrido/Feedback" />
                                    )}
                                </div>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-4">
                                <label className="block text-xs font-bold text-gray-500 uppercase mb-2">Anotações Gerais</label>
                                <textarea 
                                    value={notes} 
                                    onChange={(e) => setNotes(e.target.value)} 
                                    className="w-full h-32 p-3 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-senac-blue outline-none resize-none"
                                    placeholder="Digite aqui observações sobre o andamento, justificativas, detalhes do feedback..."
                                ></textarea>
                            </div>

                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm mb-6">
                                <div className="flex justify-between items-center mb-2">
                                    <label className="text-xs font-bold text-gray-500 uppercase flex items-center gap-2"><IconPaperclip className="w-4 h-4"/> Documentos Anexados</label>
                                    <label className="cursor-pointer bg-blue-50 text-blue-600 px-3 py-1 rounded text-xs font-bold hover:bg-blue-100 border border-blue-200 transition-colors">
                                        + Anexar
                                        <input type="file" className="hidden" accept="image/*,.pdf" onChange={handleFileUpload} />
                                    </label>
                                </div>
                                {attachments.length > 0 && (
                                    <div className="space-y-2">
                                        {attachments.map((att, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-gray-50 p-2 rounded border border-gray-200">
                                                <span className="text-xs text-blue-600 truncate">{att.name}</span>
                                                <button onClick={() => removeAttachment(idx)} className="text-red-400 hover:text-red-600"><IconTrash2 className="w-4 h-4"/></button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div className="flex justify-between items-center mb-6">
                                <button onClick={handleSendEmail} className="bg-white border border-senac-orange text-senac-orange hover:bg-orange-50 px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 shadow-sm">
                                    <IconMail className="w-4 h-4"/> Enviar por E-mail (Outlook)
                                </button>
                                <button onClick={handleSave} className="px-6 py-2 bg-senac-blue text-white hover:bg-blue-700 rounded-lg font-bold text-sm shadow flex items-center gap-2">
                                    {isSaving ? <IconRefreshCw className="w-4 h-4 animate-spin"/> : <IconSave className="w-4 h-4"/>}
                                    Salvar Nota
                                </button>
                            </div>

                            {/* HISTÓRICO DE NOTAS */}
                            {allNotes.length > 0 && (
                                <div className="border-t pt-4">
                                    <h4 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2"><IconClock className="w-4 h-4"/> Histórico Recente</h4>
                                    <div className="space-y-3">
                                        {allNotes.map(note => (
                                            <div key={note.id} className="bg-white p-3 rounded-lg border border-gray-200 shadow-sm text-sm relative group">
                                                <button onClick={() => deleteNote(note.id)} className="absolute top-2 right-2 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><IconTrash2 className="w-4 h-4"/></button>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className={`px-2 py-0.5 rounded text-[10px] font-bold uppercase ${note.urgency === 'critical' ? 'bg-red-100 text-red-700' : note.urgency === 'warning' ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'}`}>{note.urgency}</span>
                                                    <span className="text-xs text-gray-400">{new Date(note.date).toLocaleDateString()}</span>
                                                </div>
                                                <div className="mb-1 font-bold text-gray-800">{getNotebookSituationLabel(note)} {note.situationDate && <span className="font-normal text-gray-500">({new Date(note.situationDate).toLocaleDateString()})</span>}</div>
                                                {note.studentName && <div className="text-xs text-senac-blue mb-1 font-semibold flex items-center gap-1"><IconUser className="w-3 h-3"/> {note.studentName}</div>}
                                                <p className="text-gray-600 mb-2 whitespace-pre-wrap">{note.notes}</p>
                                                {note.attachments && note.attachments.length > 0 && <div className="text-xs text-gray-400 flex items-center gap-1"><IconPaperclip className="w-3 h-3"/> {note.attachments.length} anexo(s)</div>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>

                        <div className="bg-white p-4 border-t border-gray-200 flex justify-end shrink-0">
                            <button onClick={onClose} className="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg font-bold text-sm">Fechar</button>
                        </div>
                    </div>
                </div>
            );
        };

        const findMetadata = (worksheet) => {
            if (!worksheet || !window.XLSX) return {};
            const data = window.XLSX.utils.sheet_to_json(worksheet, { header: 1 });
            let foundTutor = null, foundTurma = null, foundCurso = null;
            for (let r = 0; r < Math.min(data.length, 25); r++) {
                const row = data[r];
                if (!row) continue;
                for (let c = 0; c < Math.min(row.length, 15); c++) {
                    const cellVal = String(row[c] || "").trim();
                    const lowerVal = cellVal.toLowerCase();
                    if (!foundTutor && (lowerVal.includes("tutor") || lowerVal.includes("instrutor") || lowerVal.includes("docente"))) {
                        if (cellVal.includes(":")) { const split = cellVal.split(":"); if (split[1] && split[1].trim().length > 2) foundTutor = split[1].trim(); }
                        if (!foundTutor) foundTutor = row[c+1] || row[c+2];
                    }
                    if (!foundTurma && lowerVal.includes("turma")) {
                        if (cellVal.includes(":")) { const split = cellVal.split(":"); if (split[1] && split[1].trim().length > 0) foundTurma = split[1].trim(); } 
                        else if (lowerVal.replace("turma", "").trim().length > 0) { foundTurma = cellVal.replace(/turma/i, "").trim(); } 
                        else { foundTurma = row[c+1] || row[c+2]; }
                    }
                    if (!foundCurso) {
                         if (lowerVal.startsWith("aprendizagem profissional") || (lowerVal.includes("curso") && cellVal.length > 15)) { foundCurso = cellVal; }
                    }
                }
            }
            if (!foundCurso && data[0] && data[0][4]) foundCurso = data[0][4]; 
            return { tutor: foundTutor, turma: foundTurma, curso: foundCurso };
        };

        const extractCellComments = (cell) => {
             if (!cell) return null;
             if (cell.c && Array.isArray(cell.c)) {
                 const texts = cell.c.map(comm => {
                     if (comm.t) return comm.t;
                     if (comm.r) { if(typeof comm.r === 'string') return comm.r; if(Array.isArray(comm.r)) return comm.r.map(run => run.t).join(""); }
                     return "";
                 }).filter(t => t && t.trim().length > 0);
                 if (texts.length > 0) return texts.join(" | ");
             }
             if (typeof cell.c === 'string') return cell.c;
             if (cell._comment) return String(cell._comment);
             if (cell.comment) return String(cell.comment);
             return null;
        };

        const normalizeName = (str) => {
            if(!str) return "";
            return str.toString()
                .replace(/\u00A0/g, ' ') 
                .trim()
                .toUpperCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "") 
                .replace(/\s+/g, " "); 
        };

        const isInterestingText = (text, studentName) => {
            if (!text || typeof text !== 'string') return false;
            const t = text.trim();
            if (t.length < 3) return false;
            if (/^[\d.,\s%-]+$/.test(t)) return false;
            const upper = t.toUpperCase();
            if (upper === "RESUMOFALTANTES") return false;
            if (upper === "PENDENTE") return false;
            if (/^UC\d+$/i.test(t)) return false; 
            if (/^\d{1,2}\/[a-zç]{3}\s*-\s*[a-zç]{3}$/i.test(t)) return false; 
            if (upper.includes("REQUER CONSELHO") || upper.includes("PARECER")) return true;
            const blacklist = ["SIM", "NÃO", "NAO", "APTO", "NÃO APTO", "NAO APTO", "DESENVOLVEU", "NÃO DESENVOLVEU", "NAO DESENVOLVEU", "TRANSFERIDO", "EVADIDO", "DESISTENTE", "MATRICULADO", "CURSANDO", "PRESENTE", "FALTA", "JUSTIFICADA", "TOTAL", "RESULTADO", "FINAL", "SITUAÇÃO", "OBS", "NOTA", "MÉDIA", "FREQUÊNCIA", "FREQ", "%"];
            if (blacklist.includes(upper)) return false;
            if (blacklist.some(word => upper === word)) return false; 
            if (normalizeName(t) === normalizeName(studentName)) return false;
            if (/^\d{1,2}\/\d{1,2}(\/\d{2,4})?$/.test(t)) return false; 
            return true;
        };

        const findHeaderRow = (data) => {
            for(let i=0; i<Math.min(100, data.length); i++) {
                const row = data[i]; if(!row) continue;
                const rowStr = row.map(c => String(c || "").toUpperCase()).join("|");
                if(rowStr.includes("TEXTOS ÓRION") || rowStr.includes("TEXTOS ORION") || rowStr.includes("RECUPERAÇÕES") || rowStr.includes("MOTIVO DE DESLIGAMENTO")) return i;
                if (rowStr.includes("NOME") && (rowStr.includes("SITUAÇÃO") || rowStr.includes("SITUACAO") || rowStr.includes("FREQ") || rowStr.includes("UC1") || rowStr.includes("NOTA"))) return i;
                if (rowStr.includes("UC1") && rowStr.includes("UC2") && rowStr.includes("MÉDIA")) return i;
            }
            for(let i=0; i<Math.min(100, data.length); i++) {
                const row = data[i]; if(!row) continue;
                const rowStr = row.map(c => String(c || "").toUpperCase()).join("|");
                if (rowStr.includes("NOME DO ALUNO") || rowStr.includes("NOME COMPLETO") || rowStr.includes("APRENDIZ")) return i;
                const colB = String(row[1] || "").toUpperCase().trim();
                const colC = String(row[2] || "").toUpperCase().trim();
                if ((colB === "NOME" || colB === "ALUNO") || (colC === "NOME" || colC === "ALUNO")) return i;
            }
            return -1;
        };

        const excelDateToJSDate = (serial) => {
            const utc_days  = Math.floor(serial - 25569);
            const utc_value = utc_days * 86400;                                        
            const date_info = new Date(utc_value * 1000);
            return new Date(date_info.getFullYear(), date_info.getMonth(), date_info.getDate());
        };

        const getManualProcessList = (turma) => {
            if(!turma) return [];
            try {
                const key = `process_overrides_${turma.replace(/[^a-zA-Z0-9]/g, '')}`;
                const saved = localStorage.getItem(key);
                return saved ? JSON.parse(saved) : [];
            } catch(e) { return []; }
        };

        const saveManualProcessList = (turma, list) => {
            if(!turma) return;
            try {
                const key = `process_overrides_${turma.replace(/[^a-zA-Z0-9]/g, '')}`;
                localStorage.setItem(key, JSON.stringify(list));
            } catch(e) {}
        };

        const stripAccents = (value) => String(value || "")
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");

        const normalizeText = (value) => stripAccents(value).toUpperCase().replace(/\s+/g, " ").trim();

        const rowToSearchText = (row) => (row || [])
            .map(cell => normalizeText(cell))
            .filter(Boolean)
            .join(" | ");

        const hasAnyKeyword = (text, keywords) => keywords.some(keyword => text.includes(keyword));

        const findMatchingRawCell = (row, keywords) => {
            const found = (row || []).find(cell => hasAnyKeyword(normalizeText(cell), keywords));
            return found !== undefined && found !== null ? String(found).trim() : "";
        };

        const STUDENT_DROPOUT_KEYWORDS = [
            "EVADIDO", "EVASAO", "DESISTENTE", "DESLIGADO", "DESLIGAMENTO",
            "TRANCADO", "TRANSFERIDO", "CANCELADO", "RESCINDIDO", "ENCERRADO",
            "TERMINO DE CONTRATO", "FIM DE CONTRATO"
        ];

        const STUDENT_PROCESS_KEYWORDS = [
            "EM PROCESSO", "PROCESSO DE DESLIGAMENTO", "AGUARDANDO DESLIGAMENTO",
            "PENDENTE DESLIGAMENTO", "DESLIGAMENTO EM ANDAMENTO"
        ];

        const NOT_DEVELOPED_KEYWORDS = [
            "NAO DESENVOLVEU", "NAO DESENVOLVIDO", "REPROVADO", "INSUFICIENTE"
        ];

        const RECOVERY_KEYWORDS = ["RECUPERACAO", "RECUPERAÇÃO"];

        const normalizeContraTurno = (value) => {
            const raw = String(value || "").trim();
            const normalized = normalizeText(raw);
            if (!raw || raw === "0" || raw === "-" || normalized === "NAO" || normalized.includes("SEM CONTRA")) return "Sem Contra Turno";

            const days = [];
            const addDay = (label) => { if (!days.includes(label)) days.push(label); };
            if (/\bSEG(UNDA)?\b/.test(normalized)) addDay("Seg");
            if (/\bTER(CA)?\b/.test(normalized)) addDay("Ter");
            if (/\bQUA(RTA)?\b/.test(normalized)) addDay("Qua");
            if (/\bQUI(NTA)?\b/.test(normalized)) addDay("Qui");
            if (/\bSEX(TA)?\b/.test(normalized)) addDay("Sex");

            return days.length > 0 ? days.join("/") : raw;
        };

        const classifyStudentSituation = (row, situationColIdx) => {
            const situationText = situationColIdx !== -1 ? normalizeText(row[situationColIdx]) : "";
            const fullText = rowToSearchText(row);
            const searchText = `${situationText} | ${fullText}`;
            const rawSituation = situationColIdx !== -1 && row[situationColIdx] ? String(row[situationColIdx]).trim() : "";

            if (hasAnyKeyword(searchText, STUDENT_PROCESS_KEYWORDS)) {
                return { type: "process", reason: rawSituation || findMatchingRawCell(row, STUDENT_PROCESS_KEYWORDS) || "Em Processo de Desligamento" };
            }
            if (hasAnyKeyword(searchText, STUDENT_DROPOUT_KEYWORDS)) {
                return { type: "dropout", reason: rawSituation || findMatchingRawCell(row, STUDENT_DROPOUT_KEYWORDS) || "Evadido/Desligado" };
            }
            return { type: "active", reason: "" };
        };

        const isNotDevelopedStatus = (value) => {
            const text = normalizeText(value);
            if (!text) return false;
            if (text === "ND") return true;
            if (text === "D" || text === "DESENVOLVEU" || text.includes("DESENVOLVEU") && !text.includes("NAO")) return false;
            return hasAnyKeyword(text, NOT_DEVELOPED_KEYWORDS) || hasAnyKeyword(text, RECOVERY_KEYWORDS);
        };

        const isAttendanceSheetName = (sheetName) => {
            const clean = stripAccents(sheetName).toUpperCase().replace(/\s+/g, "");
            return /^UC\d+/.test(clean) || clean.includes("PRATICA");
        };

        const parseAttendanceDate = (value) => {
            let parsedDate = null;
            if (value instanceof Date) {
                parsedDate = value;
            } else if (typeof value === 'number' && value > 40000 && value < 60000) {
                parsedDate = excelDateToJSDate(value);
            } else if (typeof value === 'string') {
                const trimmed = value.trim();
                if (/^\d{4}-\d{2}-\d{2}/.test(trimmed)) {
                    const parts = trimmed.substring(0, 10).split('-').map(Number);
                    parsedDate = new Date(parts[0], parts[1] - 1, parts[2]);
                } else if (/^\d{1,2}\/[a-zA-Z]{3}/.test(stripAccents(trimmed))) {
                    const monthMap = { JAN: 0, FEV: 1, MAR: 2, ABR: 3, MAI: 4, JUN: 5, JUL: 6, AGO: 7, SET: 8, OUT: 9, NOV: 10, DEZ: 11 };
                    const match = stripAccents(trimmed).toUpperCase().match(/^(\d{1,2})\/([A-Z]{3})/);
                    if (match && monthMap[match[2]] !== undefined) parsedDate = new Date(new Date().getFullYear(), monthMap[match[2]], Number(match[1]));
                } else if (/^\d{1,2}\/\d{1,2}(\/\d{2,4})?/.test(trimmed)) {
                    const parts = trimmed.split(/[\/\s]/).filter(Boolean);
                    const year = parts[2] ? Number(parts[2].length === 2 ? `20${parts[2]}` : parts[2]) : new Date().getFullYear();
                    parsedDate = new Date(year, Number(parts[1]) - 1, Number(parts[0]));
                }
            }

            if (!parsedDate || isNaN(parsedDate)) return null;
            return new Date(parsedDate.getFullYear(), parsedDate.getMonth(), parsedDate.getDate());
        };

        const isAttendanceValueFilled = (value) => {
            if (value === null || value === undefined) return false;
            const normalized = String(value).trim();
            return normalized.length > 0 && normalized !== "-" && normalized !== "0";
        };

        const findAttendanceHeader = (rows) => {
            for (let r = 0; r < Math.min(rows.length, 25); r++) {
                const row = rows[r] || [];
                let nameCol = -1;
                const dateCols = [];

                row.forEach((cell, c) => {
                    const label = stripAccents(cell).toUpperCase();
                    if (nameCol === -1 && (label.includes("APREND") || label.includes("ALUNO") || label.includes("NOME"))) nameCol = c;
                    const date = parseAttendanceDate(cell);
                    if (date) dateCols.push({ idx: c, date });
                });

                if (nameCol !== -1 && dateCols.length > 0) return { rowIdx: r, nameCol, dateCols };
            }
            return null;
        };

        const formatShortDate = (date) => date.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });

        const formatAttendanceWarning = (item) => {
            const status = item.type === "nao_realizada" ? "chamada não realizada" : "chamada incompleta";
            return `${formatShortDate(item.date)}: ${status} — ${item.filled} de ${item.total} alunos preenchidos`;
        };

        const summarizeAttendanceWarnings = (warnings, maxItems = 18) => {
            if (!warnings || warnings.length === 0) return "";
            const grouped = warnings.reduce((acc, item) => {
                if (!acc[item.sheet]) acc[item.sheet] = [];
                acc[item.sheet].push(item);
                return acc;
            }, {});

            const lines = Object.entries(grouped).map(([sheet, items]) => {
                const dates = items.slice(0, 6).map(formatAttendanceWarning).join("; ");
                const extra = items.length > 6 ? ` e mais ${items.length - 6}` : "";
                return `${sheet}: ${dates}${extra}`;
            });

            const visible = lines.slice(0, maxItems);
            const hidden = lines.length - visible.length;
            return `Foram encontradas possíveis pendências de chamada:\n\n${visible.join("\n")}${hidden > 0 ? `\n... e mais ${hidden} aba(s).` : ""}`;
        };

        const getActivityCellStatus = (value) => {
            const text = normalizeText(value);
            if (!text) return "blank";
            if (text === "C" || text === "CONCLUIU" || text.startsWith("C -") || text.startsWith("C (") || text.includes("CONCLUIU A ATIVIDADE")) return "completed";
            if (text === "NC" || text.includes("NAO CONCLUIU")) return "not_completed";
            if (text.includes("REQUER") && text.includes("AVALI")) return "requires_evaluation";
            return null;
        };

        const formatActivityHeaderValue = (value) => {
            if (value instanceof Date && !isNaN(value.getTime())) return value.toLocaleDateString("pt-BR");
            if (typeof value === "number" && value > 20000 && value < 60000 && window.XLSX && XLSX.SSF && XLSX.SSF.parse_date_code) {
                const parsed = XLSX.SSF.parse_date_code(value);
                if (parsed && parsed.d && parsed.m && parsed.y) return `${String(parsed.d).padStart(2, "0")}/${String(parsed.m).padStart(2, "0")}/${parsed.y}`;
            }
            return String(value || "").trim();
        };

        const simplifyActivityHeaderLabel = (label) => String(label || "")
            .replace(/\s*\|\s*\d+\s*$/, "")
            .replace(/\s*\[\s*TOTAL DE PONTOS:[^\]]*\]/gi, "")
            .replace(/\s+/g, " ")
            .trim();

        const findActivityHeader = (rows) => {
            for (let rowIdx = 0; rowIdx < Math.min(rows.length, 80); rowIdx++) {
                const row = rows[rowIdx] || [];
                const nameCols = [];
                let surnameCol = -1;
                row.forEach((cell, colIdx) => {
                    const text = normalizeText(cell);
                    if (text === "SOBRENOME" || text === "ULTIMO SOBRENOME") surnameCol = colIdx;
                    if (text === "NOME" || text === "ALUNO" || text === "APRENDIZ" || text.includes("NOME COMPLETO") || text.includes("NOME DO ALUNO") || text.includes("NOME DO APRENDIZ")) nameCols.push(colIdx);
                });
                if (nameCols.length > 0) {
                    const allNameCols = [...new Set([nameCols[0], surnameCol].filter(colIdx => colIdx >= 0))];
                    return { rowIdx, nameCol: nameCols[0], nameCols: allNameCols, surnameCol };
                }
            }
            return null;
        };

        const buildActivityHeaderLabel = (rows, header, colIdx) => {
            const values = [];
            const start = Math.max(0, header.rowIdx - 4);
            for (let rowIdx = start; rowIdx <= header.rowIdx; rowIdx++) {
                const value = formatActivityHeaderValue((rows[rowIdx] || [])[colIdx]);
                if (value && !values.includes(value)) values.push(value);
            }
            return values.join(" | ") || `Atividade ${colIdx + 1}`;
        };

        const isActivityHeaderLabel = (label) => {
            const text = normalizeText(label);
            if (!text || ["NOME", "ALUNO", "APRENDIZ", "MATRICULA", "TURMA", "STATUS", "SITUACAO", "RESULTADO", "OBS", "TOTAL", "MEDIA"].includes(text)) return false;
            if (/^UC\s*\d+$/.test(text)) return false;
            if (/^UC\s*\d+\s*(?:-\s*|\s+)?(?:IND\b|TOTAL\b|MEDIA\b|RESULTADO\b|INDICADOR\b)/.test(text)) return false;
            if (/\[\s*S\d+(?:D\d+)?(?:\s+(?:PORTFOLIO|POSTAGEM))?\s*\]/.test(text)) return true;
            if (/\b\d{1,2}[\/.-]\d{1,2}(?:[\/.-]\d{2,4})?\b/.test(text)) return true;
            return ["DATA", "DIA", "SEMANA", "ATIV", "TAREFA", "ENCONTRO", "AULA", "POSTAGEM", "PORTFOLIO", "UC"].some(keyword => text.includes(keyword));
        };

        const processActivityWorkbook = (arrayBuffer, students, sourceName = "") => {
            const XLSX = window.XLSX;
            if (!XLSX) throw new Error("A biblioteca de Excel ainda não carregou.");
            const workbook = XLSX.read(arrayBuffer, { type: "array", cellDates: true, sheetStubs: true, raw: true });
            const knownStudents = new Map((students || []).map(student => [normalizeName(student.name), student.name]));
            const activityStudents = {};
            const sheets = [];
            const totals = { completed: 0, not_completed: 0, blank: 0, requires_evaluation: 0, activities: 0 };

            const getStudentSummary = (normalizedName, displayName) => {
                if (!activityStudents[normalizedName]) activityStudents[normalizedName] = {
                    name: displayName,
                    total: 0,
                    completed: 0,
                    not_completed: 0,
                    blank: 0,
                    requires_evaluation: 0,
                    entries: []
                };
                return activityStudents[normalizedName];
            };

            workbook.SheetNames.forEach(sheetName => {
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], { header: 1, defval: "", raw: true });
                const header = findActivityHeader(rows);
                if (!header) return;

                const maxCols = rows.reduce((max, row) => Math.max(max, (row || []).length), 0);
                const activityColumns = [];
                const nameColumns = new Set(header.nameCols || [header.nameCol]);
                for (let colIdx = 0; colIdx < maxCols; colIdx++) {
                    if (nameColumns.has(colIdx)) continue;
                    const label = simplifyActivityHeaderLabel(buildActivityHeaderLabel(rows, header, colIdx));
                    let hasRecognizedStatus = false;
                    for (let rowIdx = header.rowIdx + 1; rowIdx < rows.length; rowIdx++) {
                        const cellStatus = getActivityCellStatus((rows[rowIdx] || [])[colIdx]);
                        if (cellStatus && cellStatus !== "blank") { hasRecognizedStatus = true; break; }
                    }
                    if (hasRecognizedStatus && isActivityHeaderLabel(label)) activityColumns.push({ colIdx, label });
                }
                if (activityColumns.length === 0) return;

                const sheetStudents = new Set();
                for (let rowIdx = header.rowIdx + 1; rowIdx < rows.length; rowIdx++) {
                    const row = rows[rowIdx] || [];
                    const rawName = (header.nameCols || [header.nameCol]).map(colIdx => String(row[colIdx] || "").trim()).filter(Boolean).join(" ");
                    const normalizedName = normalizeName(rawName);
                    if (!normalizedName || normalizedName.includes("TOTAL") || normalizedName.includes("MEDIA") || normalizedName.includes("APRENDIZES")) continue;
                    const displayName = knownStudents.get(normalizedName);
                    if (!displayName) continue;
                    const studentSummary = getStudentSummary(normalizedName, displayName);
                    sheetStudents.add(normalizedName);
                    activityColumns.forEach(({ colIdx, label }) => {
                        const status = getActivityCellStatus(row[colIdx]);
                        if (!status) return;
                        const entry = { status, label, sheet: sheetName, uc: (sheetName.match(/UC\s*\d+/i) || [sheetName])[0].replace(/\s+/g, "").toUpperCase() };
                        studentSummary.total++;
                        studentSummary[status]++;
                        studentSummary.entries.push(entry);
                        totals[status]++;
                        totals.activities++;
                    });
                }
                sheets.push({ name: sheetName, uc: (sheetName.match(/UC\s*\d+/i) || [sheetName])[0].replace(/\s+/g, "").toUpperCase(), activities: activityColumns.length, students: sheetStudents.size });
            });

            const attentionStudents = Object.values(activityStudents).filter(student => student.not_completed + student.blank + student.requires_evaluation > 0).length;
            return { sourceName, sheets, students: activityStudents, totals, attentionStudents };
        };

        const getActivityStudentSummary = (tracking, studentName) => tracking && tracking.students ? tracking.students[normalizeName(studentName)] || null : null;

        const formatActivityStatusLabel = (status) => ({ completed: "Concluiu", not_completed: "Não concluiu", blank: "Não fez", requires_evaluation: "Requer avaliação" }[status] || status);

        const analyzeAttendanceWarnings = (workbook, students) => {
            const XLSX = window.XLSX;
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const activeStudents = (students || []).filter(s => !s.is_dropout && !s.is_process_dropout);
            const namesForValidation = activeStudents.length > 0 ? activeStudents : (students || []);
            const knownStudents = new Set(namesForValidation.map(s => normalizeName(s.name)));
            const warnings = [];

            workbook.SheetNames.forEach(sheetName => {
                if (!isAttendanceSheetName(sheetName)) return;

                const sheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", raw: true });
                const header = findAttendanceHeader(rows);
                if (!header) return;

                const studentRows = [];
                for (let r = header.rowIdx + 1; r < rows.length; r++) {
                    const row = rows[r] || [];
                    const studentName = String(row[header.nameCol] || "").trim();
                    const normalized = normalizeName(studentName);
                    if (!normalized || normalized.includes("TOTAL") || normalized.includes("MEDIA") || normalized.includes("APRENDIZES")) continue;
                    if (knownStudents.size === 0 || knownStudents.has(normalized)) studentRows.push(row);
                }

                if (studentRows.length < 3) return;

                header.dateCols.forEach(({ idx, date }) => {
                    if (date > today) return;

                    const dayOfWeek = date.getDay();
                    if (dayOfWeek === 0 || dayOfWeek === 6) return;

                    const filled = studentRows.filter(row => isAttendanceValueFilled(row[idx])).length;
                    const total = studentRows.length;
                    const fillRate = total > 0 ? filled / total : 0;

                    if (filled === 0 || fillRate < 0.85) {
                        warnings.push({
                            sheet: sheetName,
                            date,
                            filled,
                            total,
                            type: filled === 0 ? "nao_realizada" : "incompleta"
                        });
                    }
                });
            });

            return warnings.sort((a, b) => a.date - b.date || a.sheet.localeCompare(b.sheet, 'pt-BR', { numeric: true }));
        };

        const processExcelFile = (arrayBuffer) => {
            try {
                const XLSX = window.XLSX;
                if (!XLSX) throw new Error("A biblioteca de Excel ainda não carregou.");
                
                const workbook = XLSX.read(arrayBuffer, { type: 'array', cellComments: true, sheetStubs: true, cellDates: true, cellNF: true, cellText: true, cellStyles: true });
                
                let tutor1 = "Não Identificado"; let tutor2 = "Não Identificado"; let course = "Curso não identificado"; let turma = "Turma não identificada";
                const sheetNames = workbook.SheetNames;
                
                const uc1SheetName = sheetNames.find(n => n.toUpperCase().replace(/\s/g, '').includes("UC1"));
                const uc7SheetName = sheetNames.find(n => n.toUpperCase().replace(/\s/g, '').includes("UC7"));
                if (uc1SheetName) { const m = findMetadata(workbook.Sheets[uc1SheetName]); if(m.tutor) tutor1 = m.tutor; if(m.turma) turma = m.turma; if(m.curso) course = m.curso; }
                if (uc7SheetName) { const m = findMetadata(workbook.Sheets[uc7SheetName]); if(m.tutor) tutor2 = m.tutor; if((!course || course.includes("não")) && m.curso) course = m.curso; }
                if (turma && String(turma).toUpperCase().includes("TURMA")) turma = String(turma).replace(/TURMA[:\s]*/i, '').trim();

                const manualProcessOverrides = getManualProcessList(turma);

                let pedSheetName = sheetNames.find(n => n.toUpperCase().includes("PEDAG") || n.toUpperCase().includes("GERAL") || n.toUpperCase().includes("FREQ") || n.toUpperCase().includes("CONTROLE"));
                
                let pedSheet = null;
                let headerRowIdx = -1;

                if (pedSheetName) {
                    pedSheet = workbook.Sheets[pedSheetName];
                    const jsonData = XLSX.utils.sheet_to_json(pedSheet, { header: 1 });
                    headerRowIdx = findHeaderRow(jsonData);
                }

                if (headerRowIdx === -1) {
                    for (let name of sheetNames) {
                        const s = workbook.Sheets[name];
                        const d = XLSX.utils.sheet_to_json(s, { header: 1 });
                        const idx = findHeaderRow(d);
                        if (idx !== -1) {
                            pedSheetName = name;
                            pedSheet = s;
                            headerRowIdx = idx;
                            break;
                        }
                    }
                }

                if (!pedSheet || headerRowIdx === -1) {
                    throw new Error("Cabeçalho da lista de alunos não encontrado.");
                }

                const jsonData = XLSX.utils.sheet_to_json(pedSheet, { header: 1 });
                const headerRow = jsonData[headerRowIdx];
                const nextRow1 = jsonData[headerRowIdx + 1] || [];
                const nextRow2 = jsonData[headerRowIdx + 2] || [];
                
                const rawDates = [];
                const headerRangeCheck = [headerRow, nextRow1, nextRow2];
                
                headerRangeCheck.forEach(rowArr => {
                    if(!rowArr) return;
                    rowArr.forEach(cell => {
                        let parsedDate = null;
                        if(typeof cell === 'number' && cell > 40000 && cell < 60000) {
                            parsedDate = excelDateToJSDate(cell);
                        } else if(cell instanceof Date) {
                            parsedDate = cell;
                        } else if(typeof cell === 'string' && cell.match(/^\d{1,2}\/\d{1,2}/)) {
                            const parts = cell.split('/');
                            if(parts.length >= 2) {
                                const d = parseInt(parts[0]);
                                const m = parseInt(parts[1]) - 1;
                                const y = new Date().getFullYear(); 
                                parsedDate = new Date(y, m, d);
                            }
                        }

                        if(parsedDate && !isNaN(parsedDate)) {
                            parsedDate.setHours(0,0,0,0);
                            if(!rawDates.some(d => d.getTime() === parsedDate.getTime())) {
                                rawDates.push(parsedDate);
                            }
                        }
                    });
                });
                rawDates.sort((a,b) => a - b);
                
                let conselhoColIdx = -1; 
                let ensinoMedioColIdx = -1;
                let nameColIdx = -1;
                let situationColIdx = -1;
                
                for(let idx = 0; idx < Math.max(headerRow.length, nextRow1.length); idx++) {
                    const l1 = normalizeText(headerRow[idx]);
                    const l2 = normalizeText(nextRow1[idx]);
                    const l3 = normalizeText(nextRow2[idx]);
                    const fullHeader = l1 + " " + l2 + " " + l3;
                    
                    if (fullHeader.includes("CONSELHO") && (fullHeader.includes("TEXTO") || fullHeader.includes("OBS"))) conselhoColIdx = idx;
                    if ((fullHeader.includes("ENSINO") && fullHeader.includes("MEDIO")) || fullHeader.includes("CONTRATURNO") || fullHeader.includes("CONTRA TURNO")) ensinoMedioColIdx = idx;
                    if (fullHeader.includes("NOME") && nameColIdx === -1) nameColIdx = idx;
                    if ((fullHeader.includes("SITUACAO") || fullHeader.includes("STATUS") || fullHeader.includes("RESULTADO")) && situationColIdx === -1) situationColIdx = idx;
                }

                if (nameColIdx === -1) nameColIdx = 2; 

                const students = [];
                const allFoundUCs = new Set();
                
                let startRow = headerRowIdx + 1;
                if(jsonData[startRow] && String(jsonData[startRow][1] || "").toUpperCase().includes("DATA")) startRow++;

                for (let i = startRow; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row) continue;

                    let name = row[nameColIdx];
                    if (typeof name === 'number') { 
                         if (row[nameColIdx+1] && isNaN(row[nameColIdx+1])) name = row[nameColIdx+1];
                         else if (row[nameColIdx-1] && isNaN(row[nameColIdx-1])) name = row[nameColIdx-1];
                    }
                    if (typeof name === 'number' || !name) {
                        const candidate = row.slice(0, 5).find(c => typeof c === 'string' && c.length > 3 && !c.match(/^\d+$/));
                        if(candidate) name = candidate;
                    }
                    
                    if(!name || String(name).length < 3) continue;
                    name = String(name).trim();
                    const normalizedCandidateName = normalizeText(name);
