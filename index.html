                                <label className="cursor-pointer bg-white border border-senac-orange text-senac-orange hover:bg-orange-50 px-4 py-2 rounded-lg flex items-center gap-2 shadow transition-all active:scale-95 text-sm font-medium" title="Ler planilha de atividades"><IconUploadCloud className="w-4 h-4" /> Ler atividades <input type="file" className="hidden" accept=".xlsx,.xlsm,.xls" onChange={(e) => { handleActivityFile(e.target.files[0]); e.target.value = ''; }} /></label>
                                <button onClick={() => generateReport(reportSelection, data.students, data.turma, data.course, tutor1Name, tutor2Name, activityTracking)} className="bg-white border border-senac-blue text-senac-blue hover:bg-blue-50 px-4 py-2 rounded-lg flex items-center gap-2 shadow transition-all active:scale-95 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed" disabled={reportSelection.length === 0}><IconPrinter className="w-4 h-4" /> Gerar Relatório {reportSelection.length > 0 && `(${reportSelection.length})`}</button>
                                <button onClick={() => setShowAtaModal(!showAtaModal)} className="bg-senac-blue hover:bg-blue-800 text-white px-4 py-2 rounded-lg flex items-center gap-2 shadow transition-all active:scale-95 text-sm font-medium"><IconFileText className="w-4 h-4" /> Gerar ATA</button>
                            </div>
                        </div>
                        <div className="bg-white border-t border-gray-100">
                            <div className="max-w-7xl mx-auto px-4 py-2 flex items-center gap-6 text-xs text-gray-600 overflow-x-auto">
                                <span className="flex items-center gap-2 font-bold whitespace-nowrap text-senac-orange"><IconUser className="w-3.5 h-3.5" /> Instrutores (Clique para anotar):</span>
                                <button 
                                    onClick={() => setSelectedInstructorForNotes(tutor1Name)} 
                                    className="whitespace-nowrap font-medium hover:bg-blue-50 px-2 py-0.5 rounded transition-colors text-blue-700 flex items-center gap-1"
                                    title="Abrir Caderno do Instrutor"
                                >
                                    {tutor1Name} <IconEdit3 className="w-3 h-3 opacity-50"/>
                                </button>
                                <span className="text-gray-300">|</span>
                                <button 
                                    onClick={() => setSelectedInstructorForNotes(tutor2Name)} 
                                    className="whitespace-nowrap font-medium hover:bg-blue-50 px-2 py-0.5 rounded transition-colors text-blue-700 flex items-center gap-1"
                                    title="Abrir Caderno do Instrutor"
                                >
                                    {tutor2Name} <IconEdit3 className="w-3 h-3 opacity-50"/>
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-6">
                        <DashboardCharts stats={stats} context={selectedUC} />
                        {data.attendanceWarnings && data.attendanceWarnings.length > 0 && (
                            <div className="mb-6 bg-yellow-50 border border-yellow-200 border-l-4 border-l-yellow-500 rounded-lg p-4 text-sm text-yellow-900 shadow-sm">
                                <div className="font-bold flex items-center gap-2 mb-2"><IconAlertTriangle className="w-4 h-4"/> Pendências de preenchimento da chamada</div>
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-2">
                                    {Object.entries(data.attendanceWarnings.reduce((acc, item) => {
                                        if (!acc[item.sheet]) acc[item.sheet] = [];
                                        acc[item.sheet].push(item);
                                        return acc;
                                    }, {})).map(([sheet, items]) => (
                                        <div key={sheet} className="bg-white/70 border border-yellow-100 rounded-md px-3 py-2">
                                            <div className="font-bold text-xs text-yellow-800 mb-1">{sheet}</div>
                                            <div className="text-xs">{items.slice(0, 6).map(formatAttendanceWarning).join("; ")}{items.length > 6 ? ` e mais ${items.length - 6}` : ""}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                        {activityTracking && activityAttentionStudents.length > 0 && (
                            <div className="mb-6 bg-red-50 border border-red-200 border-l-4 border-l-red-500 rounded-lg p-4 text-sm text-red-900 shadow-sm">
                                <div className="font-bold flex items-center gap-2 mb-2"><IconAlertTriangle className="w-4 h-4"/> Pendências de atividades</div>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 mb-3">
                                    <div className="bg-white/80 border border-red-100 rounded-md px-3 py-2"><div className="font-bold text-xs text-red-800">Não concluiu</div><div className="text-lg font-bold">{activityTracking.totals.not_completed}</div></div>
                                    <div className="bg-white/80 border border-red-100 rounded-md px-3 py-2"><div className="font-bold text-xs text-red-800">Em branco</div><div className="text-lg font-bold">{activityTracking.totals.blank}</div></div>
                                    <div className="bg-white/80 border border-red-100 rounded-md px-3 py-2"><div className="font-bold text-xs text-red-800">Requer avaliação</div><div className="text-lg font-bold">{activityTracking.totals.requires_evaluation}</div></div>
                                </div>
                                <div className="text-xs"><strong>Alunos com pontos de atenção:</strong> {activityAttentionStudents.slice(0, 12).map(student => `${student.name} (${student.not_completed + student.blank + student.requires_evaluation})`).join("; ")}{activityAttentionStudents.length > 12 ? `; e mais ${activityAttentionStudents.length - 12}` : ""}</div>
                            </div>
                        )}
                        <div className="bg-white p-2 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 sticky top-28 z-10">
                            <div className="flex gap-1 overflow-x-auto w-full md:w-auto px-1 items-center">
                                <button onClick={toggleSelectAll} className="mr-2 text-gray-400 hover:text-senac-blue">{reportSelection.length > 0 && reportSelection.length === filteredStudents.length ? <IconCheckSquare className="w-5 h-5" /> : <IconSquare className="w-5 h-5" />}</button>
                                
                                <div className="relative mr-2">
                                    <IconFilter className="w-3 h-3 absolute left-2 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none"/>
                                    <select 
                                        value={selectedUC} 
                                        onChange={(e) => setSelectedUC(e.target.value)}
                                        className="pl-7 pr-4 py-2 rounded-lg text-xs font-bold border border-gray-200 bg-gray-50 text-gray-700 hover:bg-white focus:ring-2 focus:ring-senac-blue cursor-pointer transition-all appearance-none"
                                        style={{backgroundImage: 'none'}}
                                    >
                                        <option value="all">Todas as UCs (Global)</option>
                                        {data.ucs.map(uc => <option key={uc} value={uc}>{uc}</option>)}
                                    </select>
                                </div>

                                <button onClick={() => setFilter('all')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'all' ? 'bg-senac-blue text-white shadow-md' : 'text-gray-500 hover:bg-gray-50'}`}>Todos ({stats.total})</button>
                                <button onClick={() => setFilter('developed')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'developed' ? 'bg-green-600 text-white shadow-md' : 'text-green-600 hover:bg-green-50'}`}>Desenvolveu ({stats.developed})</button>
                                <button onClick={() => setFilter('failed')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'failed' ? 'bg-red-600 text-white shadow-md' : 'text-red-600 hover:bg-red-50'}`}>Recuperação ({stats.failed})</button>
                                <button onClick={() => setFilter('lowFreq')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'lowFreq' ? 'bg-yellow-500 text-white shadow-md' : 'text-yellow-600 hover:bg-yellow-50'}`}>Conselho ({stats.warning})</button>
                                <button onClick={() => setFilter('process')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'process' ? 'bg-purple-600 text-white shadow-md' : 'text-purple-600 hover:bg-purple-50'}`}>Em Processo ({stats.process})</button>
                                <button onClick={() => setFilter('dropout')} className={`px-4 py-2 rounded-lg text-xs font-bold whitespace-nowrap ${filter === 'dropout' ? 'bg-orange-500 text-white shadow-md' : 'text-orange-500 hover:bg-orange-50'}`}>Evasão ({stats.dropout})</button>
                            </div>
                            <div className="relative w-full md:w-64 mr-2"><IconSearch className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-4 h-4" /><input type="text" placeholder="Buscar aluno..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-lg bg-gray-50 border-none focus:ring-2 focus:ring-senac-blue text-sm transition-all" /></div>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                            {filteredStudents.length === 0 ? (<div className="col-span-full py-16 text-center"><div className="inline-block p-4 rounded-full bg-gray-100 mb-4"><IconSearch className="w-8 h-8 text-gray-400"/></div><p className="text-gray-500 font-medium">Nenhum aluno encontrado.</p></div>) : (filteredStudents.map((student) => {
                                const isDropout = student.is_dropout;
                                const isProcess = student.is_process_dropout;
                                const activitySummary = getActivityStudentSummary(activityTracking, student.name);
                                
                                let displayFreq = student.averageFreq;
                                let ucStatus = null;
                                let ucData = null;
                                let isSpecificUCView = selectedUC !== 'all';

                                if (isSpecificUCView) {
                                    ucData = student.uc_scores[selectedUC];
                                    if (ucData) { displayFreq = (ucData.score * 100).toFixed(1); ucStatus = ucData.status; } else { displayFreq = "N/A"; }
                                }

                                const hasPerfIssues = student.needs_recuperacao && !isDropout && !isProcess;
                                const hasFreqIssues = student.needs_conselho && !isDropout && !isProcess && !hasPerfIssues;
                                
                                let borderColor = "border-gray-100";
                                let statusBadge = null;

                                if (isDropout) { borderColor = "border-l-4 border-l-orange-500"; statusBadge = <span className="px-2 py-1 bg-orange-100 text-orange-700 text-[10px] font-bold rounded uppercase flex items-center gap-1"><IconLogOut className="w-3 h-3"/> {student.dropout_reason || "Evasão"}</span>; } 
                                else if (isProcess) { borderColor = "border-l-4 border-l-purple-500"; statusBadge = <span className="px-2 py-1 bg-purple-100 text-purple-700 text-[10px] font-bold rounded uppercase flex items-center gap-1"><IconClock className="w-3 h-3"/> Em Processo</span>; } 
                                else if (isSpecificUCView) {
                                    if (!ucData) { borderColor = "border-l-4 border-l-slate-300"; statusBadge = <span className="px-2 py-1 bg-slate-100 text-slate-500 text-[10px] font-bold rounded uppercase">Sem dados na {selectedUC}</span>; }
                                    else if (isNotDevelopedStatus(ucStatus)) { borderColor = "border-l-4 border-l-red-500"; statusBadge = <span className="px-2 py-1 bg-red-100 text-red-700 text-[10px] font-bold rounded uppercase">Reprovado na {selectedUC}</span>; }
                                    else if (parseFloat(displayFreq) < 75) { borderColor = "border-l-4 border-l-yellow-400"; statusBadge = <span className="px-2 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded uppercase">Baixa Freq na {selectedUC}</span>; }
                                    else { borderColor = "border-l-4 border-l-green-500"; statusBadge = <span className="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase">OK na {selectedUC}</span>; }
                                }
                                else if (hasPerfIssues) { borderColor = "border-l-4 border-l-red-500"; statusBadge = <span className="px-2 py-1 bg-red-100 text-red-700 text-[10px] font-bold rounded uppercase">Reprovado</span>; } 
                                else if (hasFreqIssues) { borderColor = "border-l-4 border-l-yellow-400"; statusBadge = <span className="px-2 py-1 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded uppercase">Conselho</span>; } 
                                else { borderColor = "border-l-4 border-l-green-500"; statusBadge = <span className="px-2 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded uppercase">Desenvolveu</span>; }
                                
                                const isSelected = reportSelection.includes(student.id);
                                
                                return (
                                    <div key={student.id} className={`bg-white rounded-xl shadow-sm border ${borderColor} hover:shadow-md relative group ${isDropout ? 'bg-orange-50/30' : isProcess ? 'bg-purple-50/30' : ''}`}>
                                        <div className="absolute top-4 left-3 z-10" onClick={(e) => e.stopPropagation()}><input type="checkbox" checked={isSelected} onChange={() => toggleStudentSelection(student.id)} className="w-5 h-5 rounded border-gray-300 text-senac-blue focus:ring-senac-blue cursor-pointer" /></div>
                                        <div className="p-5 pl-10 cursor-pointer" onClick={() => setSelectedStudentForModal(student)}>
                                            <div className="flex justify-between items-start mb-3 gap-2"><h3 className="font-bold text-gray-800 text-sm leading-snug">{student.name}</h3><div className="flex items-center gap-2">{(student.conselho_text || (student.comments || []).length > 0 || (student.all_observations || []).length > 0) && (<div className="text-senac-blue" title="Obs"><IconMessageSquare className="w-4 h-4" /></div>)}<div className="flex-shrink-0">{statusBadge}</div></div></div>
                                            <div className="flex justify-between items-end mb-1"><span className="text-xs text-gray-400 font-medium uppercase tracking-wider">{selectedUC === 'all' ? 'Frequência Global' : `Frequência ${selectedUC}`}</span><span className={`text-lg font-bold ${displayFreq !== "N/A" && parseFloat(displayFreq) < 75 ? 'text-yellow-600' : 'text-gray-700'}`}>{displayFreq}%</span></div>
                                            <ProgressBar value={displayFreq === "N/A" ? 0 : displayFreq} />
                                            {activitySummary && activitySummary.total > 0 && (
                                                <div className={`mt-3 pt-2 border-t flex flex-wrap gap-1.5 text-[10px] font-bold ${activitySummary.not_completed + activitySummary.blank + activitySummary.requires_evaluation > 0 ? 'border-red-100' : 'border-green-100'}`}>
                                                    <span className="bg-green-100 text-green-700 px-2 py-1 rounded">Atividades {activitySummary.completed}/{activitySummary.total}</span>
                                                    {activitySummary.not_completed > 0 && <span className="bg-red-100 text-red-700 px-2 py-1 rounded">NC {activitySummary.not_completed}</span>}
                                                    {activitySummary.blank > 0 && <span className="bg-gray-100 text-gray-700 px-2 py-1 rounded">Em branco {activitySummary.blank}</span>}
                                                    {activitySummary.requires_evaluation > 0 && <span className="bg-yellow-100 text-yellow-700 px-2 py-1 rounded">Avaliar {activitySummary.requires_evaluation}</span>}
                                                    {activitySummary.not_completed + activitySummary.blank + activitySummary.requires_evaluation === 0 && <span className="bg-green-50 text-green-700 px-2 py-1 rounded">Tudo avaliado</span>}
                                                </div>
                                            )}
                                            <div className="flex items-center gap-2 text-[11px] text-gray-500 mt-3 pt-2 border-t border-gray-50"><IconCalendar className="w-3 h-3 text-gray-400" /><span>Contra Turno: <span className={`font-semibold ${student.contra_turno_desc !== "Sem Contra Turno" ? 'text-senac-blue' : 'text-gray-400'}`}>{student.contra_turno_desc}</span></span></div>
                                        </div>
                                    </div>
                                );
                            }))}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AuthGate />);
    </script>
</body>
</html>
