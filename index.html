                    if (normalizedCandidateName.includes("TOTAL") || normalizedCandidateName.includes("APRENDIZES") || normalizedCandidateName.includes("MEDIA") || normalizedCandidateName.includes("DATA")) continue;

                    let contraTurnoVal = "";
                    if (ensinoMedioColIdx !== -1 && row[ensinoMedioColIdx]) contraTurnoVal = String(row[ensinoMedioColIdx]).trim();

                    const studentRec = {
                        id: i, 
                        name: name, 
                        averageFreq: 0.0, 
                        status: "Desenvolveu", 
                        low_freq_ucs: [], failed_perf_ucs: [], 
                        needs_recuperacao: false, needs_conselho: false,
                        is_dropout: false, is_process_dropout: false, dropout_reason: "", 
                        conselho_text: conselhoColIdx !== -1 ? String(row[conselhoColIdx] || "").trim() : "",
                        contra_turno_desc: normalizeContraTurno(contraTurnoVal), 
                        all_observations: [], comments: [],
                        uc_scores: {} 
                    };

                    if (manualProcessOverrides.includes(normalizeName(name))) {
                        studentRec.is_process_dropout = true;
                        studentRec.status = "Em Processo de Desligamento";
                    }

                    const situation = classifyStudentSituation(row, situationColIdx);
                    if (situation.type === "dropout") {
                         studentRec.is_dropout = true;
                         studentRec.status = "Evadido/Desligado";
                         studentRec.dropout_reason = situation.reason;
                    } else if (situation.type === "process" && !studentRec.is_process_dropout) {
                         studentRec.is_process_dropout = true;
                         studentRec.status = "Em Processo de Desligamento";
                         studentRec.dropout_reason = situation.reason;
                    }

                    if (!studentRec.is_dropout && !studentRec.is_process_dropout) {
                        try {
                            const cellAddress = XLSX.utils.encode_cell({r: i, c: nameColIdx});
                            const cell = pedSheet[cellAddress];
                            if (cell && cell.s && cell.s.font && cell.s.font.color && cell.s.font.color.rgb) {
                                const color = cell.s.font.color.rgb;
                                if (isOrangeFont(color)) {
                                    studentRec.is_process_dropout = true;
                                    studentRec.status = "Em Processo de Desligamento";
                                }
                            }
                        } catch (e) {}
                    }

                    const freqScores = []; 
                    let ucCount = 1;
                    
                    for (let col = 4; col < 60; col += 2) {
                        if (col > 24 && (!row[col] && !row[col+1])) if (!row[col+2]) break;
                        let ucName = `UC${ucCount}`; 
                        if (col === 26) ucName = "Prática Profissional"; 
                        
                        let scoreVal = row[col]; 
                        if (typeof scoreVal === 'string' && scoreVal.includes('%')) {
                            scoreVal = parseFloat(scoreVal.replace('%','').replace(',','.')) / 100;
                        } else {
                            scoreVal = parseFloat(scoreVal);
                        }
                        if (!isNaN(scoreVal) && scoreVal > 1 && scoreVal <= 100) scoreVal = scoreVal / 100;

                        const statusVal = String(row[col+1] || "");
                        
                        if (!isNaN(scoreVal)) {
                            freqScores.push(scoreVal);
                            studentRec.uc_scores[ucName] = { score: scoreVal, status: statusVal };
                            allFoundUCs.add(ucName);

                            if (scoreVal < 0.75) { 
                                studentRec.low_freq_ucs.push(ucName); 
                                if(!studentRec.is_dropout && !studentRec.is_process_dropout) studentRec.needs_conselho = true; 
                            }
                        }
                        
                        if (isNotDevelopedStatus(statusVal)) { 
                            studentRec.failed_perf_ucs.push(ucName); 
                            if(!studentRec.is_dropout && !studentRec.is_process_dropout) { 
                                studentRec.needs_recuperacao = true; 
                                studentRec.status = "Não Desenvolveu"; 
                            } 
                        }
                        ucCount++; if (ucCount > 20) break;
                    }
                    if (freqScores.length > 0) studentRec.averageFreq = (freqScores.reduce((a, b) => a + b, 0) / freqScores.length * 100).toFixed(1);
                    
                    if (studentRec.is_dropout) studentRec.status = "Evadido/Desligado";
                    else if (studentRec.is_process_dropout) studentRec.status = "Em Processo de Desligamento";
                    else if (studentRec.needs_recuperacao) studentRec.status = "Não Desenvolveu";
                    else if (studentRec.needs_conselho) studentRec.status = "Conselho de Classe"; 

                    students.push(studentRec);
                }

                sheetNames.forEach(sheetName => {
                    const sheet = workbook.Sheets[sheetName];
                    const rawData = XLSX.utils.sheet_to_json(sheet, { header: 1 });
                    let sheetHeaderRow = findHeaderRow(rawData);
                    let nameColIdx = -1;
                    
                    if (sheetHeaderRow !== -1) {
                         const hRow = rawData[sheetHeaderRow];
                         hRow.forEach((c, idx) => { const cellStr = String(c || "").toUpperCase(); if(cellStr.includes("NOME") || cellStr.includes("ALUNO") || cellStr.includes("APRENDIZ")) nameColIdx = idx; });
                    }
                    if (nameColIdx === -1 && sheetHeaderRow !== -1) nameColIdx = 1; 
                    
                    if (sheetHeaderRow === -1) {
                        for(let r=0; r<10; r++) {
                            if(!rawData[r]) continue;
                            for(let c=0; c<5; c++) {
                                const val = String(rawData[r][c] || "").toUpperCase();
                                if(val.includes("NOME") || val.includes("ALUNO")) { nameColIdx = c; sheetHeaderRow = r; break; }
                            }
                            if(nameColIdx !== -1) break;
                        }
                    }
                    
                    if (sheetHeaderRow === -1) sheetHeaderRow = 0; 

                    const headerRow = rawData[sheetHeaderRow];
                    const nextRow1 = rawData[sheetHeaderRow + 1] || [];
                    const criticalCols = [];
                    const isUCSheet = sheetName.toUpperCase().includes("UC") || sheetName.toUpperCase().includes("MOD") || sheetName.toUpperCase().includes("MÓD");
                    const isPedagogicalSheet = sheetName === pedSheetName; 

                    if(headerRow) {
                        const maxCols = Math.max(headerRow.length, nextRow1.length, 150);
                        for(let idx = 0; idx < maxCols; idx++) {
                            const fullHeader = (String(headerRow[idx] || "") + " " + String(nextRow1[idx] || "")).toUpperCase(); 

                            if (isPedagogicalSheet && ((fullHeader.includes("TEXTO") || fullHeader.includes("PARECER")) && (fullHeader.includes("CONSELHO") || fullHeader.includes("CLASSE")))) { criticalCols.push({ idx, name: "Conselho de Classe", type: 'force_conselho' }); }
                            else if (fullHeader.includes("MOTIVO") || fullHeader.includes("DESLIGAMENTO") || fullHeader.includes("RECUPERA") || fullHeader.includes("ORION") || fullHeader.includes("ÓRION")) {
                                 let customName = "Obs (" + sheetName + ")";
                                 if(fullHeader.includes("MOTIVO") || fullHeader.includes("DESLIGAMENTO")) customName = "Desligamento/Obs (" + sheetName + ")";
                                 else if(fullHeader.includes("RECUPERA")) customName = "Recuperação (" + sheetName + ")";
                                 else if(fullHeader.includes("ORION") || fullHeader.includes("ÓRION")) customName = "Órion (" + sheetName + ")";
                                 criticalCols.push({ idx, name: customName, type: 'force_obs' });
                            }
                            else if (isUCSheet && (fullHeader.startsWith("OBSERVA") || fullHeader.includes("OBSERVAÇÕES") || fullHeader.includes("OBSERVACOES") || fullHeader.includes("ANOTAÇ"))) { criticalCols.push({ idx, name: "Obs (" + sheetName + ")", type: 'force_obs' }); }
                            else if(fullHeader.includes("TEXTOS ÓRION") || fullHeader.includes("RECUPERAÇÕES") || fullHeader.includes("OCORRÊNCIA") || (isUCSheet && fullHeader.includes("SITUAÇÃO FINAL")) ) { criticalCols.push({ idx, name: fullHeader.substring(0, 30), type: 'auto' }); }
                        }
                    }

                    for (let r = sheetHeaderRow + 1; r < rawData.length; r++) {
                        const row = rawData[r];
                        if (!row) continue;
                        const nameInSheet = String(row[nameColIdx] || "").trim();
                        if (nameInSheet.length < 3) continue;
                        const normalized = normalizeName(nameInSheet);
                        const student = students.find(s => normalizeName(s.name) === normalized);
                        if(student) {
                            if (!student.is_dropout && !student.is_process_dropout) {
                                try {
                                    const cellAddress = XLSX.utils.encode_cell({r: r, c: nameColIdx});
                                    const cell = sheet[cellAddress];
                                    if (cell && cell.s && cell.s.font && cell.s.font.color && cell.s.font.color.rgb) {
                                        const color = cell.s.font.color.rgb;
                                        if (isOrangeFont(color)) {
                                            student.is_process_dropout = true;
                                            student.status = "Em Processo de Desligamento";
                                            if(!student.all_observations.some(o => o.text.includes("Identificado como 'Em Processo'"))) {
                                                student.all_observations.push({ source: "Sistema", text: `Identificado como 'Em Processo' pela cor de fonte ${color} na aba ${sheetName}` });
                                            }
                                        }
                                    }
                                } catch(e) {}
                            }
                            
                            row.forEach((cellVal, idx) => {
                                const valStr = String(cellVal || "").trim();
                                if(valStr.length < 2 || valStr === "0" || valStr === "-") return;
                                if (/^[\d.,\s%-]+$/.test(valStr)) return;
                                const isCritical = criticalCols.find(cc => cc.idx === idx);
                                if (isCritical) {
                                    if (isCritical.type === 'force_conselho') { student.conselho_text = valStr; if(!student.all_observations.some(o => o.text === valStr)) student.all_observations.push({ source: "[Conselho]", text: valStr }); }
                                    else if (isCritical.type === 'force_obs') { let sourceLabel = `[${isCritical.name}]`; if(!student.all_observations.some(o => o.text === valStr)) student.all_observations.push({ source: sourceLabel, text: valStr }); }
                                    else { let sourceLabel = sheetName; if(isCritical.name.includes("ORION") || isCritical.name.includes("ÓRION")) sourceLabel = "Órion/Recuperação"; if(!student.all_observations.some(o => o.text === valStr)) student.all_observations.push({ source: sourceLabel, text: valStr }); }
                                } else { if(isInterestingText(valStr, student.name)) { if(!student.all_observations.some(o => o.text === valStr && o.source === sheetName)) student.all_observations.push({ source: sheetName, text: valStr }); } }
                            });
                            if (sheet['!ref']) {
                                row.forEach((_, colIdx) => {
                                    const cellAddress = XLSX.utils.encode_cell({r: r, c: colIdx});
                                    const cell = sheet[cellAddress];
                                    if(cell) {
                                        const comment = extractCellComments(cell);
                                        if(comment) {
                                            const cleanComment = comment.replace(student.name, '').trim();
                                            if(cleanComment.length > 2 && !cleanComment.toUpperCase().includes("TOTAL")) { if(!student.all_observations.some(o => o.text.includes(cleanComment))) student.all_observations.push({ source: sheetName, text: `[Comentário]: ${cleanComment}` }); }
                                        }
                                    }
                                });
                            }
                        }
                    }
                });

                const attendanceWarnings = analyzeAttendanceWarnings(workbook, students);
                return { course, turma, tutor1, tutor2, students, ucs: Array.from(allFoundUCs).sort(), courseDates: rawDates, attendanceWarnings };
            } catch (error) {
                console.error(error);
                alert("Erro ao ler o arquivo: " + error.message);
                return null;
            }
        };

        const generateHash = (str) => {
            let hash = 0; if (str.length === 0) return "0000";
            for (let i = 0; i < str.length; i++) { const char = str.charCodeAt(i); hash = ((hash << 5) - hash) + char; hash = hash & hash; }
            return Math.abs(hash).toString(16).toUpperCase().substring(0, 8);
        };

        const maskCPF = (cpf) => {
            const clean = cpf.replace(/\D/g, ''); if(clean.length < 3) return cpf;
            if(clean.length >= 9) return `***.${clean.substr(3,3)}.${clean.substr(6,3)}-**`; return cpf;
        };

        const generateSignatureBlock = (role, name, cpf, matricula, rubricaSrc) => {
            if (rubricaSrc) {
                return `
                    <div class="sig-block" style="text-align: center; margin: 20px auto 30px auto; width: 100%;">
                        <img src="${rubricaSrc}" alt="Assinatura" style="height: 60px; max-width: 200px; margin-bottom: 5px; object-fit: contain; display: block; margin-left: auto; margin-right: auto;" />

                        <div><strong>${name}</strong></div>
                        <div>${role}</div>
                    </div>
                `;
            }
            if(cpf && cpf.length > 5 && matricula && matricula.length > 2) {
                const now = new Date();
                const timestamp = now.toLocaleDateString() + " " + now.toLocaleTimeString();
                const hash = generateHash(name + cpf + matricula + timestamp);
                const masked = maskCPF(cpf);
                return `
                    <div class="sig-digital-block" style="border: 1px solid #ccc; padding: 10px; margin: 10px auto; width: 90%; max-width: 400px; text-align: left; font-size: 10pt; background-color: #f9f9f9;">
                        <div style="font-weight: bold; border-bottom: 1px solid #ddd; margin-bottom: 5px; padding-bottom: 2px;">Assinado Eletronicamente</div>

                        <div><strong>Função:</strong> ${role}</div>
                        <div><strong>CPF:</strong> ${masked} | <strong>Matrícula:</strong> ${matricula}</div>
                        <div style="margin-top:5px; font-size: 8pt; color: #555;">Hash de Validação: <span style="font-family: monospace;">${hash}</span></div>
                        <div style="font-size: 8pt; color: #777;">Data: ${timestamp}</div>
                    </div>
                `;
            }
            return `
                <div class="sig-block" style="text-align: center; margin: 20px auto 30px auto; width: 100%;">
                    <div style="border-top: 1px solid black; width: 300px; margin: 0 auto 5px auto;"></div>
                    <div><strong>${name}</strong></div>
                    <div>${role}</div>
                </div>`;
        };

        const generateAtaHTMLContent = (analistaName, analistaCPF, analistaMatricula, analistaRubrica, students, course, turma, tutor1, tutor1CPF, tutor1Matricula, tutor1Rubrica, tutor2, tutor2CPF, tutor2Matricula, tutor2Rubrica, logoSrc) => {
            const date = new Date();
            const dateStr = date.toLocaleDateString('pt-BR', { day: 'numeric', month: 'long', year: 'numeric' });
            const finalLogo = logoSrc || "https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Senac_logo.svg/500px-Senac_logo.svg.png";
            const studentsWithIssues = students.filter(s => (s.needs_recuperacao || s.needs_conselho) && !s.is_dropout && !s.is_process_dropout);
            const studentsOk = students.filter(s => !s.needs_recuperacao && !s.needs_conselho && !s.is_dropout && !s.is_process_dropout);
            const studentsDropouts = students.filter(s => s.is_dropout);
            const studentsProcess = students.filter(s => s.is_process_dropout);
            const isVendas = String(course).toLowerCase().includes("vendas");
            const rangeTutor1 = "UC1 à UC6";
            const rangeTutor2 = isVendas ? "UC7 à UC13" : "UC7 à UC11";
            let textIssues = "";
            const issueDescriptions = studentsWithIssues.map(s => {
                const ucsFreq = s.low_freq_ucs.join(", ");
                const ucsPerf = s.failed_perf_ucs.join(", ");
                let desc = "";
                if (s.needs_recuperacao) { const ucs = ucsPerf || "Geral"; desc = `o(a) aluno(a) <strong>${s.name}</strong> não atendeu os indicadores de avaliação na(s) Unidade(s) Curricular(es) ${ucs}, não desenvolvendo o curso`; } 
                else if (s.needs_conselho) { desc = `o(a) aluno(a) <strong>${s.name}</strong> finalizou a(s) Unidade(s) Curricular(es) ${ucsFreq} com baixa frequência, porém atendeu os indicadores finais de avaliação, desenvolvendo o curso`; }
                return desc;
            });
            if (issueDescriptions.length > 0) textIssues = issueDescriptions.join("; ") + ".";
            let textOk = studentsOk.length > 0 ? "Os demais alunos que compõem a turma desenvolveram o curso sem ressalvas." : "";
            let textDropouts = "";
            if (studentsDropouts.length > 0) { const names = studentsDropouts.map(s => s.name).join(", "); textDropouts = `<p>Constatou-se ainda que os alunos <strong>${names}</strong>, solicitaram desligamento do Programa de Aprendizagem.</p>`; }
            let textProcess = "";
            if (studentsProcess.length > 0) { const names = studentsProcess.map(s => s.name).join(", "); textProcess = `<p>Os alunos <strong>${names}</strong> encontram-se em processo administrativo de desligamento.</p>`; }
            const sigAnalista = generateSignatureBlock("Analista Responsável", analistaName || "Analista", analistaCPF, analistaMatricula, analistaRubrica);
            const sigTutor1 = generateSignatureBlock("Instrutor(a)", tutor1, tutor1CPF, tutor1Matricula, tutor1Rubrica);
            const sigTutor2 = generateSignatureBlock("Instrutor(a)", tutor2, tutor2CPF, tutor2Matricula, tutor2Rubrica);
            return `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Ata de Conselho</title>
                <style>
                    body { font-family: 'Arial', sans-serif; font-size: 12pt; line-height: 1.5; text-align: justify; margin: 20px; color: #000; background: white; }
                    .header { text-align: center; font-weight: bold; margin-bottom: 20px; }
                    .ata-number { text-align: left; font-weight: bold; margin-bottom: 20px; }
                    p { text-indent: 1.25cm; margin-bottom: 0; margin-top: 0; }
                    .logo-container { text-align: center; margin-bottom: 20px; }
                    .signatures { margin-top: 50px; }
                </style>
                </head>
                <body>
                    <div id="print-area">
                        <div class="logo-container"><img src="${finalLogo}" width="120" style="max-width: 150px; height: auto;"></div>
                        <div class="header">UNIDADE DE EDUCAÇÃO PROFISSIONAL E TECNOLÓGICA DO SENAC, EM CURITIBA</div>
                        <div class="ata-number">ATA Nº: _________________</div>
                        <p>Ata do Conselho de Classe, do curso de <strong>${course}</strong>, Formação Inicial e Continuada, turma <strong>${turma}</strong>, para deliberar sobre a situação dos alunos citados abaixo. No dia ${dateStr}, foram convocados pela Analista <strong>${analistaName || "[ANALISTA]"}</strong>, os(as) instrutores(as) <strong>${tutor1} (${rangeTutor1})</strong> e <strong>${tutor2} (${rangeTutor2})</strong>.</p>
                        <p>A analista <strong>${analistaName || "[ANALISTA]"}</strong> iniciou os trabalhos solicitando que as análises do desempenho dos alunos bem como suas necessidades/dificuldades fossem levadas em consideração. ${textIssues} ${textOk}</p>
                        ${textDropouts}
                        ${textProcess}
                        <p>Nada mais havendo a tratar, foi lavrada a presente ata que vai assinada por mim, ${analistaName || "[ANALISTA]"} e pelos que estiveram presentes na qualidade de participantes da reunião.</p>
                        <br><br><p>Curitiba, ${dateStr}.</p>
                        <div class="signatures"><h4 style="text-align:center; font-size:12pt; margin-bottom:10px;">Manifesto de Assinaturas</h4>${sigAnalista} ${sigTutor1} ${sigTutor2}</div>
                    </div>
                </body>
                </html>
            `;
        };

        const downloadAtaDocument = (contentRef, turma) => {
            if (!contentRef.current) return;
            const editedHtml = contentRef.current.innerHTML;
            const fullHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Ata</title><style>@page { size: A4; margin: 3cm 2cm 2cm 3cm; }</style></head><body>${editedHtml}</body></html>`;
            const blob = new Blob([fullHtml], { type: 'application/msword' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob); link.download = `Ata_Conselho_${turma}.doc`; document.body.appendChild(link); link.click(); document.body.removeChild(link);
        };
        
        const printAtaDocument = () => {
             const style = document.createElement('style');
             style.innerHTML = `@media print { @page { size: A4 portrait; margin: 2cm; } body { -webkit-print-color-adjust: exact; } }`;
             document.head.appendChild(style);
             const printContent = document.getElementById("ata-preview-content");
             if(printContent) {
                 const printArea = document.createElement('div');
                 printArea.id = 'print-area';
                 printArea.innerHTML = printContent.innerHTML;
                 document.body.appendChild(printArea);
                 window.print();
                 document.body.removeChild(printArea);
             }
             document.head.removeChild(style);
        };

        const generateReport = (selectedStudentIds, students, turma, course, tutor1, tutor2, activityTracking) => {
            const selected = students.filter(s => selectedStudentIds.includes(s.id));
            if (selected.length === 0) { alert("Selecione pelo menos um aluno."); return; }
            const printWindow = window.open('', '_blank');
            const dateStr = new Date().toLocaleDateString('pt-BR');
            const htmlContent = `
                <html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório</title>
                <style>
                    body { font-family: 'Arial', sans-serif; padding: 20px; color: #333; background: #fff; margin: 0; }
                    .report-menu { background-color: #004587; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; left: 0; right: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
                    .menu-actions { display: flex; gap: 8px; }
                    .menu-title { color: white; font-weight: bold; font-size: 14px; }
                    .btn { border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; color: white; background-color: #F5821F; }
                    @media print { .report-menu { display: none !important; } }
                    .student-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
                    .header-row { display: flex; justify-content: space-between; border-bottom: 2px solid #F5821F; padding-bottom: 5px; margin-bottom: 10px; }
                    .student-name { font-size: 16px; font-weight: bold; }
                    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 12px; margin-bottom: 10px; }
                    .section-title { font-weight: bold; margin-top: 10px; font-size: 12px; color: #004587; }
                    .comment-box { background-color: #f9fafb; padding: 8px; border-left: 3px solid #F5821F; font-size: 11px; margin-top: 5px; color: #555; }
                    .source-tag { font-weight: bold; color: #F5821F; margin-right: 5px; }
                    .obs-text { white-space: pre-wrap; word-break: break-word; }
                </style></head><body>
                    <div class="report-menu"><div class="menu-title">Relatório</div><div class="menu-actions"><button onclick="copyReportVisual()" id="copy-report" class="btn">Copiar para e-mail</button><button onclick="window.print()" class="btn">Imprimir</button></div></div>
                    <div id="report-content">
                    <div style="text-align:center; margin-top: 10px;"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Senac_logo.svg/500px-Senac_logo.svg.png" width="80" /></div>
                    <h1 style="text-align:center; font-size:18px;">Relatório de Desempenho</h1>
                    <h2 style="text-align:center; font-size:14px; color:#666;">${course}</h2>
                    <div style="text-align:center; font-size:12px; margin-bottom:20px;">
                        <strong>Turma:</strong> ${turma} | <strong>Data:</strong> ${dateStr}<br>
                        <strong>Instrutores:</strong> ${tutor1} / ${tutor2}
                    </div>
                    ${selected.map(s => {
                        let statusColor = "color:#16a34a";
                        if(s.is_dropout) statusColor = "color:#f97316"; else if(s.is_process_dropout) statusColor = "color:#9333ea"; else if(s.needs_recuperacao) statusColor = "color:#dc2626"; else if(s.needs_conselho) statusColor = "color:#ca8a04";
                        const obsHtml = s.all_observations && s.all_observations.length > 0
                            ? '<div class="section-title">Relatos e Observações de Todas as Abas:</div>' + s.all_observations.map(o => '<div class="comment-box"><span class="source-tag">[' + o.source + ']</span><span class="obs-text">' + o.text + '</span></div>').join('')
                            : '<div class="comment-box" style="font-style:italic;">Nenhuma observação extra encontrada.</div>';
                        const mainObsHtml = s.conselho_text ? '<div class="section-title">Obs. Conselho (Principal):</div><div style="font-size:12px;">"' + s.conselho_text + '"</div>' : '';
                        const activitySummary = getActivityStudentSummary(activityTracking, s.name);
                        const activityAttention = activitySummary ? activitySummary.entries.filter(entry => entry.status !== "completed") : [];
                        const activityItemsHtml = activityAttention.slice(0, 18).map(entry => '<span class="source-tag">' + formatActivityStatusLabel(entry.status) + ':</span>' + entry.label + ' (' + entry.sheet + ')').join("<br>");
                        const activityHtml = activitySummary && activitySummary.total > 0
                            ? '<div class="section-title">Acompanhamento de atividades:</div><div class="comment-box"><strong>Resumo:</strong> ' + activitySummary.completed + ' concluídas de ' + activitySummary.total + '; ' + activitySummary.not_completed + ' não concluídas; ' + activitySummary.blank + ' em branco; ' + activitySummary.requires_evaluation + ' requerem avaliação.</div>' + (activityAttention.length > 0 ? '<div class="comment-box">' + activityItemsHtml + (activityAttention.length > 18 ? '<br><em>... e mais ' + (activityAttention.length - 18) + ' pendência(s).</em>' : '') + '</div>' : '')
                            : '';
                        return '<div class="student-card">' +
                            '<div class="header-row"><span class="student-name">' + s.name + '</span><span style="' + statusColor + '; font-weight:bold;">' + s.status + '</span></div>' +
                            '<div class="info-grid"><div><strong>Frequência Global:</strong> ' + s.averageFreq + '%</div><div><strong>Contra Turno:</strong> ' + s.contra_turno_desc + '</div></div>' +
                            (s.low_freq_ucs.length > 0 ? '<div style="font-size:12px; color:#ca8a04;">⚠️ Baixa Frequência: ' + s.low_freq_ucs.join(", ") + '</div>' : '') +
                            (s.failed_perf_ucs.length > 0 ? '<div style="font-size:12px; color:#dc2626;">❌ Desempenho: ' + s.failed_perf_ucs.join(", ") + '</div>' : '') +
                            mainObsHtml + activityHtml + obsHtml + '</div>';
                    }).join('')}
                    </div>
                    <script>
                        function copyReportVisual() {
                            const content = document.getElementById('report-content');
                            const button = document.getElementById('copy-report');
                            if (!content) return;
                            const done = () => {
                                if (!button) return;
                                button.textContent = 'Copiado';
                                setTimeout(() => { button.textContent = 'Copiar para e-mail'; }, 1800);
                            };
                            const fallback = () => {
                                const range = document.createRange();
                                range.selectNodeContents(content);
                                const selection = window.getSelection();
                                selection.removeAllRanges();
                                selection.addRange(range);
                                try { document.execCommand('copy'); done(); } finally { selection.removeAllRanges(); }
                            };
                            if (navigator.clipboard && window.ClipboardItem) {
                                const copyContent = content.cloneNode(true);
                                copyContent.style.cssText = 'font-family:Arial,sans-serif;color:#333;background:#fff;margin:0;padding:20px;';
                                const inlineStyles = {
                                    '.student-card': 'border:1px solid #ddd;padding:15px;margin-bottom:15px;border-radius:8px;',
                                    '.header-row': 'display:flex;justify-content:space-between;border-bottom:2px solid #F5821F;padding-bottom:5px;margin-bottom:10px;',
                                    '.student-name': 'font-size:16px;font-weight:bold;',
                                    '.info-grid': 'display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:12px;margin-bottom:10px;',
                                    '.section-title': 'font-weight:bold;margin-top:10px;font-size:12px;color:#004587;',
                                    '.comment-box': 'background-color:#f9fafb;padding:8px;border-left:3px solid #F5821F;font-size:11px;margin-top:5px;color:#555;',
                                    '.source-tag': 'font-weight:bold;color:#F5821F;margin-right:5px;'
                                };
                                Object.entries(inlineStyles).forEach(([selector, style]) => copyContent.querySelectorAll(selector).forEach(element => { element.style.cssText = style; }));
                                const html = copyContent.outerHTML;
                                const item = new ClipboardItem({
                                    'text/html': new Blob([html], { type: 'text/html' }),
                                    'text/plain': new Blob([copyContent.innerText], { type: 'text/plain' })
                                });
                                navigator.clipboard.write([item]).then(done).catch(fallback);
                            } else fallback();
                        }
                    <\/script>
                </body></html>`;
            printWindow.document.write(htmlContent); printWindow.document.close();
        };

        const getFirebaseAuth = () => {
            const config = window.SENAC_FIREBASE_CONFIG;
            if (!config || !config.projectId || !window.firebase || !firebase.auth) return null;
            if (!firebase.apps.length) firebase.initializeApp(config);
            return firebase.auth();
        };

        const getAuthMessage = (error) => {
            const messages = {
                "auth/invalid-credential": "E-mail ou senha incorretos.",
                "auth/email-already-in-use": "Este e-mail já possui cadastro.",
                "auth/weak-password": "A senha precisa ter pelo menos 6 caracteres.",
                "auth/invalid-email": "Informe um e-mail válido.",
                "auth/too-many-requests": "Muitas tentativas. Aguarde alguns minutos.",
                "auth/network-request-failed": "Não foi possível conectar ao Firebase.",
                "auth/operation-not-allowed": "O login por e-mail ainda não foi ativado no Firebase.",
                "auth/quota-exceeded": "O limite de envio de e-mails foi atingido. Aguarde e tente novamente mais tarde.",
                "auth/invalid-sender": "O remetente do e-mail não está configurado no Firebase.",
                "auth/invalid-message-payload": "O modelo do e-mail está inválido no Firebase.",
                "auth/unauthorized-continue-uri": "O endereço do site não está autorizado no Firebase."
            };
            if (error && error.code) console.error("Firebase Auth:", error.code, error.message || error);
            return messages[error && error.code] || `Não foi possível concluir o acesso (${error && error.code ? error.code : "erro desconhecido"}).`;
        };

        const isAllowedSenacEmail = (value) => {
            const config = window.SENAC_FIREBASE_CONFIG || {};
            const domains = Array.isArray(config.allowedEmailDomains) ? config.allowedEmailDomains : [config.allowedEmailDomain || "@pr.senac.br"];
            const email = String(value || "").trim().toLowerCase();
            return domains.some(domain => email.endsWith(String(domain).toLowerCase()));
        };

        const AuthGate = () => {
            const auth = getFirebaseAuth();
            const [user, setUser] = useState(null);
            const [ready, setReady] = useState(!auth);
            const [email, setEmail] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");
            const [message, setMessage] = useState("");
            const [busy, setBusy] = useState(false);

            useEffect(() => {
                if (!auth) return undefined;
                return auth.onAuthStateChanged(currentUser => {
                    setUser(currentUser);
                    window.SENAC_CURRENT_USER = currentUser || null;
                    setReady(true);
                });
            }, [auth]);

            if (!auth) return <App />;
            if (!ready) return <div className="min-h-screen flex items-center justify-center bg-slate-100 text-slate-600">Carregando acesso...</div>;
            const submit = async (event) => {
                event.preventDefault();
                setError(""); setMessage(""); setBusy(true);
                try {
                    if (!isAllowedSenacEmail(email)) throw new Error("EMAIL_DOMAIN_INVALID");
                    await auth.signInWithEmailAndPassword(email.trim(), password);
                } catch (err) {
                    if (err.message === "EMAIL_DOMAIN_INVALID") setError("Use um e-mail terminado em @pr.senac.br ou @docente.pr.senac.br.");
                    else setError(getAuthMessage(err));
                } finally { setBusy(false); }
            };

            const logout = async () => { await auth.signOut(); setUser(null); window.SENAC_CURRENT_USER = null; };

            if (user && isAllowedSenacEmail(user.email)) return <App />;

            if (user && !isAllowedSenacEmail(user.email)) return <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4"><div className="bg-white rounded-xl shadow p-8 max-w-md text-center"><h1 className="text-xl font-bold text-red-700">E-mail não autorizado</h1><p className="text-sm text-slate-600 mt-3">Use um e-mail institucional terminado em @pr.senac.br ou @docente.pr.senac.br.</p><button onClick={logout} className="mt-5 text-sm text-senac-blue hover:underline">Sair</button></div></div>;

            return <div className="min-h-screen bg-slate-100 flex items-center justify-center p-4">
                <div className="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
                    <div className="bg-senac-blue px-8 py-7 text-white">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Senac_logo.svg/500px-Senac_logo.svg.png" alt="Senac Paraná" className="h-10 w-auto object-contain object-left mb-4 brightness-0 invert" />
                        <div className="text-xs uppercase tracking-widest font-bold text-blue-200">Senac Paraná</div>
                        <h1 className="text-2xl font-bold mt-2">Gestão de Frequência</h1>
                        <p className="text-sm text-blue-100 mt-1">Acesso do instrutor</p>
                    </div>
                    <form onSubmit={submit} className="p-8 space-y-4">
                        <div><label className="block text-xs font-bold text-slate-600 mb-1">E-mail institucional</label><input type="email" value={email} onChange={e => setEmail(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" placeholder="nome@pr.senac.br ou nome@docente.pr.senac.br" required /></div>
                        <div><label className="block text-xs font-bold text-slate-600 mb-1">Senha</label><input type="password" value={password} onChange={e => setPassword(e.target.value)} className="w-full border border-slate-300 rounded-lg px-3 py-2.5" minLength="6" required /></div>
                        {error && <div className="bg-red-50 text-red-700 border border-red-200 rounded-lg p-3 text-sm">{error}</div>}
                        {message && <div className="bg-green-50 text-green-700 border border-green-200 rounded-lg p-3 text-sm">{message}</div>}
                        <button disabled={busy} className="w-full bg-senac-orange hover:bg-orange-600 disabled:opacity-60 text-white font-bold rounded-lg py-3">{busy ? "Entrando..." : "Entrar"}</button>
                    </form>
                </div>
            </div>;
        };

        function App() {
            // --- ESTADOS DO SISTEMA ---
            const [data, setData] = useState(null);
            const [activityTracking, setActivityTracking] = useState(null);
            const [dragActive, setDragActive] = useState(false);
            
            // --- MODAIS ---
            const [showAtaModal, setShowAtaModal] = useState(false);
            const [selectedStudentForModal, setSelectedStudentForModal] = useState(null);
            const [instructorNotesForStudent, setInstructorNotesForStudent] = useState([]); // Notas do instrutor para o aluno selecionado

            // Novo Estado V72 - Instrutor Selecionado para Notas
            const [selectedInstructorForNotes, setSelectedInstructorForNotes] = useState(null);

            // --- FILTROS E SELEÇÃO ---
            const [filter, setFilter] = useState('all'); 
            const [selectedUC, setSelectedUC] = useState('all'); 
            const [searchTerm, setSearchTerm] = useState('');
            const [reportSelection, setReportSelection] = useState([]); 

            // --- DADOS DA ATA / ASSINATURAS ---
            const [customLogo, setCustomLogo] = useState(null);
            const [analistaName, setAnalistaName] = useState('');
            const [analistaCPF, setAnalistaCPF] = useState("");
            const [analistaMatricula, setAnalistaMatricula] = useState("");
            const [analistaRubrica, setAnalistaRubrica] = useState(null);
            const [tutor1Name, setTutor1Name] = useState("");
            const [tutor1CPF, setTutor1CPF] = useState("");
            const [tutor1Matricula, setTutor1Matricula] = useState("");
            const [tutor1Rubrica, setTutor1Rubrica] = useState(null);
            const [tutor2Name, setTutor2Name] = useState("");
            const [tutor2CPF, setTutor2CPF] = useState("");
            const [tutor2Matricula, setTutor2Matricula] = useState("");
            const [tutor2Rubrica, setTutor2Rubrica] = useState(null);

            const ataContentRef = useRef(null);

            useEffect(() => {
                if(data) {
                    if(data.tutor1) setTutor1Name(data.tutor1);
                    if(data.tutor2) setTutor2Name(data.tutor2);
                }
            }, [data]);

            // Carrega notas locais ou do Firestore e inclui também registros feitos para a turma inteira.
            useEffect(() => {
                if (selectedStudentForModal && data) {
                    const instructors = [tutor1Name, tutor2Name].filter(Boolean);
                    let isCurrent = true;
                    Promise.all(instructors.map(async instName => {
                        const loaded = await loadNotebookNotes(data.turma, instName);
                        return loaded.notes
                            .filter(note => note.scope === "class" || Number(note.studentId) === Number(selectedStudentForModal.id) || (note.studentIds || []).includes(Number(selectedStudentForModal.id)))
                            .map(note => ({ ...note, instructorSource: instName }));
                    })).then(groups => {
                        if (!isCurrent) return;
                        const allFoundNotes = groups.flat().sort((a, b) => new Date(b.date) - new Date(a.date));
                        setInstructorNotesForStudent(allFoundNotes);
                    });
                    return () => { isCurrent = false; };
                } else {
                    setInstructorNotesForStudent([]);
                }
            }, [selectedStudentForModal, data, tutor1Name, tutor2Name]);


            useEffect(() => {
                if (showAtaModal && data && ataContentRef.current) {
                    const html = generateAtaHTMLContent(
                        analistaName, analistaCPF, analistaMatricula, analistaRubrica,
                        data.students, data.course, data.turma, 
                        tutor1Name, tutor1CPF, tutor1Matricula, tutor1Rubrica, 
                        tutor2Name, tutor2CPF, tutor2Matricula, tutor2Rubrica, 
                        customLogo
                    );
                    const bodyContent = html.match(/<body>([\s\S]*)<\/body>/)[1];
                    ataContentRef.current.innerHTML = bodyContent;
                    ataContentRef.current.id = "ata-preview-content";
                }
            }, [showAtaModal, analistaName, analistaCPF, analistaMatricula, analistaRubrica, tutor1Name, tutor1CPF, tutor1Matricula, tutor1Rubrica, tutor2Name, tutor2CPF, tutor2Matricula, tutor2Rubrica, customLogo, data]);

            const handleFile = async (file) => {
                if (!file) return;
                try {
                    const buffer = await file.arrayBuffer();
                    const processed = processExcelFile(buffer);
                    if (processed) { 
                        setData(processed); 
                        setActivityTracking(null);
                        setReportSelection([]); 
                        setSelectedUC('all');
                        if (processed.attendanceWarnings && processed.attendanceWarnings.length > 0) {
                            setTimeout(() => alert(summarizeAttendanceWarnings(processed.attendanceWarnings)), 100);
                        }
                    }
                } catch (e) { alert("Erro: " + e.message); }
            };
            const handleActivityFile = async (file) => {
                if (!file || !data) return;
                try {
                    const buffer = await file.arrayBuffer();
                    const tracking = processActivityWorkbook(buffer, data.students, file.name);
                    const hasMatchedStudents = tracking && Object.keys(tracking.students || {}).length > 0;
                    if (!tracking || tracking.sheets.length === 0 || !hasMatchedStudents) {
                        setActivityTracking(null);
                        alert("Não foi encontrada uma estrutura de atividades com nomes de alunos e colunas de acompanhamento.");
                        return;
                    }
                    setActivityTracking(tracking);
                } catch (e) { alert("Erro ao ler o acompanhamento de atividades: " + e.message); }
            };
            const handleLogoUpload = (e) => { const file = e.target.files[0]; if(file) { const r = new FileReader(); r.onloadend=()=>{setCustomLogo(r.result)}; r.readAsDataURL(file); } };
            const handleDrop = (e) => { e.preventDefault(); setDragActive(false); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); };

            const getStudentScopeStatus = (student, uc) => {
                if (student.is_dropout) return "dropout";
                if (student.is_process_dropout) return "process";
                if (uc !== "all") {
                    const ucData = student.uc_scores && student.uc_scores[uc];
                    if (!ucData || isNaN(Number(ucData.score))) return "pending";
                    const scorePercent = Number(ucData.score) <= 1 ? Number(ucData.score) * 100 : Number(ucData.score);
                    if (isNotDevelopedStatus(ucData.status)) return "failed";
                    if (scorePercent < 75) return "lowFreq";
                    return "developed";
                }
                if (student.needs_recuperacao) return "failed";
                if (student.needs_conselho) return "lowFreq";
                return "developed";
            };

            const stats = useMemo(() => {
                if (!data) return null;
                const total = data.students.length;
                let dropout = 0, process = 0, failed = 0, warning = 0, developed = 0, totalScore = 0, validScoreCount = 0;

                data.students.forEach(s => {
                    const scopeStatus = getStudentScopeStatus(s, selectedUC);
                    if (scopeStatus === "dropout") dropout++;
                    else if (scopeStatus === "process") process++;
                    else if (scopeStatus === "failed") failed++;
                    else if (scopeStatus === "lowFreq") warning++;
                    else if (scopeStatus === "developed") developed++;

                    let score = parseFloat(s.averageFreq);
                    if (selectedUC !== 'all' && s.uc_scores && s.uc_scores[selectedUC]) {
                        const ucScore = Number(s.uc_scores[selectedUC].score);
                        score = (ucScore <= 1 ? ucScore * 100 : ucScore);
                    }
                    if (!isNaN(score)) { totalScore += score; validScoreCount++; }
                });
                return { total, failed, developed, warning, dropout, process, avgClass: validScoreCount > 0 ? (totalScore / validScoreCount).toFixed(1) : "0.0" };
            }, [data, selectedUC]);

            const toggleProcessDropout = (studentId) => {
                const newData = { ...data };
                const sIndex = newData.students.findIndex(s => s.id === studentId);
                if (sIndex > -1) {
                    const student = newData.students[sIndex];
                    const current = student.is_process_dropout;
                    const newValue = !current;
                    student.is_process_dropout = newValue;
                    if(newValue) { student.status = "Em Processo de Desligamento"; } else { if (student.needs_recuperacao) student.status = "Não Desenvolveu"; else if (student.needs_conselho) student.status = "Conselho de Classe"; else student.status = "Desenvolveu"; }
                    setData(newData);
                    const currentManualList = getManualProcessList(data.turma);
                    const normalizedName = normalizeName(student.name);
                    let newList;
                    if (newValue) { if(!currentManualList.includes(normalizedName)) newList = [...currentManualList, normalizedName]; else newList = currentManualList; } else { newList = currentManualList.filter(n => n !== normalizedName); }
                    saveManualProcessList(data.turma, newList);
                    if(selectedStudentForModal && selectedStudentForModal.id === studentId) setSelectedStudentForModal(student);
                }
            };

            const filteredStudents = useMemo(() => {
                if (!data) return [];
                return data.students.filter(s => {
                    const matchesSearch = s.name.toLowerCase().includes(searchTerm.toLowerCase());
                    if (!matchesSearch) return false;
                    const scopeStatus = getStudentScopeStatus(s, selectedUC);
                    if (filter === 'developed') return scopeStatus === 'developed';
                    if (filter === 'failed') return scopeStatus === 'failed';
                    if (filter === 'lowFreq') return scopeStatus === 'lowFreq';
                    if (filter === 'dropout') return scopeStatus === 'dropout';
                    if (filter === 'process') return scopeStatus === 'process';
                    return true;
                });
            }, [data, filter, searchTerm, selectedUC]);

            const toggleStudentSelection = (id) => setReportSelection(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
            const toggleSelectAll = () => setReportSelection(reportSelection.length === filteredStudents.length ? [] : filteredStudents.map(s => s.id));
            const activityAttentionStudents = activityTracking ? Object.values(activityTracking.students).filter(student => student.not_completed + student.blank + student.requires_evaluation > 0).sort((a, b) => (b.not_completed + b.blank + b.requires_evaluation) - (a.not_completed + a.blank + a.requires_evaluation)) : [];
            const selectedActivitySummary = selectedStudentForModal ? getActivityStudentSummary(activityTracking, selectedStudentForModal.name) : null;

            if (!data) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-4">
                        <div className="absolute top-4 right-4 text-xs text-gray-400">Acesso Livre (Admin Mode)</div>
                        <div className="w-full max-w-2xl bg-white rounded-2xl shadow-2xl overflow-hidden animate-slide-up">
                            <div className="bg-senac-blue p-8 text-center relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
                                <div className="relative z-10"><h1 className="text-2xl font-bold text-white mb-2">Gestão de Frequência</h1><p className="text-blue-100">Relatório e ATA</p></div>
                            </div>
                            <div className="p-10 text-center">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Senac_logo.svg/500px-Senac_logo.svg.png" className="h-16 mx-auto mb-6" />
                                <p className="text-gray-500 mb-8 max-w-md mx-auto">Arraste sua planilha <strong>(.xlsm)</strong> para gerar o dashboard.</p>
                                <div className={`border-2 border-dashed rounded-xl p-12 transition-all cursor-pointer ${dragActive ? 'border-senac-orange bg-orange-50 scale-105' : 'border-gray-300 hover:border-senac-blue hover:bg-blue-50'}`} onDragEnter={(e) => { e.preventDefault(); setDragActive(true); }} onDragLeave={(e) => { e.preventDefault(); setDragActive(false); }} onDragOver={(e) => e.preventDefault()} onDrop={handleDrop} onClick={() => document.getElementById('fileUpload').click()}>
                                    <IconUploadCloud className={`w-16 h-16 mx-auto mb-4 ${dragActive ? 'text-senac-orange' : 'text-gray-400'}`} /><p className="text-gray-700 font-semibold text-lg">Clique ou arraste o arquivo aqui</p>
                                    <input id="fileUpload" type="file" className="hidden" accept=".xlsx, .xlsm" onChange={(e) => handleFile(e.target.files[0])} />
                                </div >
                                <div className="mt-8 pt-6 border-t border-gray-100"><button onClick={() => { setData(DEMO_DATA); setActivityTracking(null); setSelectedUC('all'); }} className="text-sm text-gray-400 hover:text-senac-orange">Testar com versão Demo</button></div>
                            </div>
                        </div>
                        <div className="absolute bottom-2 right-4 text-xs text-gray-400 font-mono">v7.6 - Caderno Atualizado</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-[#f0f2f5] pb-20 animate-fade-in relative">
                    <div className="absolute bottom-2 right-4 text-xs text-gray-400 font-mono">v7.6 - Caderno Atualizado</div>
                    
                    {/* MODAIS */}
                    {selectedInstructorForNotes && (
                        <InstructorNotebook 
                            instructorName={selectedInstructorForNotes} 
                            turma={data.turma} 
                            students={data.students}
                            onClose={() => setSelectedInstructorForNotes(null)} 
                        />
                    )}

                    {showAtaModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 backdrop-blur-sm p-4 animate-fade-in" onClick={(e) => {if(e.target===e.currentTarget) setShowAtaModal(false)}}>
                            <div className="bg-white w-full max-w-[95%] h-[90vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                                <div className="bg-senac-blue p-4 text-white flex justify-between items-center shrink-0">
                                    <h2 className="text-xl font-bold flex items-center gap-2"><IconFileText className="w-6 h-6"/> Gerador de ATA Digital</h2>
                                    <button onClick={() => setShowAtaModal(false)} className="hover:bg-white/20 p-1 rounded-full"><IconXCircle className="w-6 h-6"/></button>
                                </div>
                                <div className="flex-1 overflow-hidden flex flex-col lg:flex-row">
                                    <div className="w-full lg:w-[400px] bg-gray-50 p-5 overflow-y-auto border-r border-gray-200 shrink-0 custom-scrollbar">
                                        <h3 className="text-sm font-bold text-gray-700 mb-6 uppercase tracking-wider border-b pb-2 flex items-center gap-2"><IconEdit3 className="w-4 h-4"/> Configuração da ATA</h3>
                                        <div className="space-y-6">
                                            <div className="bg-white p-4 rounded-xl border border-gray-200 shadow-sm">
                                                <label className="text-xs font-bold text-gray-500 mb-2 block uppercase">Logotipo</label>
                                                <div className="flex items-center gap-2">
                                                    <label className="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-600 px-4 py-2 rounded-lg text-xs font-bold transition-colors flex items-center gap-2 flex-1 justify-center border border-slate-200"><IconImage className="w-4 h-4 text-senac-orange"/> Escolher Arquivo... <input type="file" className="hidden" accept="image/*" onChange={handleLogoUpload} /></label>
                                                    {customLogo && <button onClick={() => setCustomLogo(null)} className="text-red-500 hover:text-red-700 p-2 bg-red-50 rounded-lg border border-red-100"><IconTrash2 className="w-4 h-4"/></button>}
                                                </div>
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border-l-4 border-l-senac-blue border-y border-r border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-2 mb-3"><div className="w-6 h-6 rounded-full bg-senac-blue text-white flex items-center justify-center text-xs font-bold">1</div><h4 className="font-bold text-sm text-senac-blue uppercase">Analista Responsável</h4></div>
                                                <input type="text" value={analistaName} onChange={(e) => setAnalistaName(e.target.value)} className="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm mb-3 focus:ring-2 focus:ring-senac-blue focus:border-senac-blue outline-none" placeholder="Nome Completo" />
                                                <SignatureUploader label="Assinatura Digital" name={analistaName} cpf={analistaCPF} matricula={analistaMatricula} rubricaSrc={analistaRubrica} onChangeName={setAnalistaName} onChangeCPF={setAnalistaCPF} onChangeMatricula={setAnalistaMatricula} onSetRubrica={setAnalistaRubrica} />
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border-l-4 border-l-senac-orange border-y border-r border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-2 mb-3"><div className="w-6 h-6 rounded-full bg-senac-orange text-white flex items-center justify-center text-xs font-bold">2</div><h4 className="font-bold text-sm text-senac-orange uppercase">Instrutor 1 (UC1-UC6)</h4></div>
                                                <SignatureUploader label="Assinatura Digital" name={tutor1Name} cpf={tutor1CPF} matricula={tutor1Matricula} rubricaSrc={tutor1Rubrica} onChangeName={setTutor1Name} onChangeCPF={setTutor1CPF} onChangeMatricula={setTutor1Matricula} onSetRubrica={setTutor1Rubrica} />
                                            </div>
                                            <div className="bg-white p-4 rounded-xl border-l-4 border-l-senac-orange border-y border-r border-gray-200 shadow-sm">
                                                <div className="flex items-center gap-2 mb-3"><div className="w-6 h-6 rounded-full bg-senac-orange text-white flex items-center justify-center text-xs font-bold">3</div><h4 className="font-bold text-sm text-senac-orange uppercase">Instrutor 2 (UC7-Fim)</h4></div>
                                                <SignatureUploader label="Assinatura Digital" name={tutor2Name} cpf={tutor2CPF} matricula={tutor2Matricula} rubricaSrc={tutor2Rubrica} onChangeName={setTutor2Name} onChangeCPF={setTutor2CPF} onChangeMatricula={setTutor2Matricula} onSetRubrica={setTutor2Rubrica} />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="flex-1 bg-gray-200/50 p-6 overflow-y-auto flex justify-center items-start preview-scroll relative">
                                        <div className="bg-white shadow-2xl min-h-[29.7cm] w-[21cm] p-[2.5cm] text-justify text-[12pt] leading-relaxed relative transition-all editable-document" ref={ataContentRef} contentEditable={true} suppressContentEditableWarning={true} spellCheck={true}><div className="flex flex-col items-center justify-center h-full text-gray-400 gap-3"><div className="w-10 h-10 border-4 border-gray-200 border-t-senac-blue rounded-full animate-spin"></div><p className="font-medium">Gerando documento...</p></div></div>
                                    </div>
                                </div>
                                <div className="bg-white p-4 border-t border-gray-200 flex justify-end gap-3 shrink-0 z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]"><button onClick={() => setShowAtaModal(false)} className="px-5 py-2.5 text-gray-600 hover:bg-gray-100 rounded-lg font-bold text-sm transition-colors border border-transparent hover:border-gray-200">Cancelar</button><button onClick={() => printAtaDocument()} className="px-6 py-2.5 bg-senac-orange text-white hover:bg-orange-600 rounded-lg font-bold shadow-lg flex items-center gap-2 text-sm"><IconPrinter className="w-4 h-4"/> Imprimir / Salvar PDF</button><button onClick={() => downloadAtaDocument(ataContentRef, data.turma)} className="px-8 py-2.5 bg-senac-blue hover:bg-blue-800 text-white rounded-lg font-bold shadow-lg hover:shadow-xl flex items-center gap-2 text-sm transition-all transform hover:-translate-y-0.5"><IconDownload className="w-4 h-4"/> Baixar Documento (.doc)</button></div>
                            </div>
                        </div>
                    )}
                    {selectedStudentForModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4 animate-fade-in" onClick={(e) => {if(e.target===e.currentTarget) setSelectedStudentForModal(null)}}>
                            <div className="bg-white w-full max-w-3xl rounded-2xl shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="bg-senac-blue p-6 text-white flex justify-between items-start shrink-0">
                                    <div><h2 className="text-2xl font-bold leading-tight">{selectedStudentForModal.name}</h2><div className="flex items-center gap-3 mt-2 text-blue-100 text-sm"><span className="bg-white/20 px-2 py-0.5 rounded flex items-center gap-1"><IconCalendar className="w-3 h-3"/> {selectedStudentForModal.contra_turno_desc}</span><span className="bg-white/20 px-2 py-0.5 rounded font-bold">{selectedStudentForModal.averageFreq}% Freq.</span></div></div>
                                    <button onClick={() => setSelectedStudentForModal(null)} className="p-1 hover:bg-white/20 rounded-full"><IconXCircle className="w-8 h-8"/></button>
                                </div>
                                <div className="p-8 overflow-y-auto">
                                    <div className="mb-6 flex justify-between items-center"><h3 className="text-sm font-bold text-gray-400 uppercase tracking-wider">Situação Atual</h3><label className="flex items-center gap-2 text-xs bg-purple-50 px-2 py-1 rounded border border-purple-200 cursor-pointer hover:bg-purple-100"><input type="checkbox" checked={selectedStudentForModal.is_process_dropout} onChange={() => toggleProcessDropout(selectedStudentForModal.id)} className="rounded text-purple-600 focus:ring-purple-500" /> Marcar como "Em Processo de Desligamento"</label></div>
                                    <div className="flex gap-2 mb-6">{selectedStudentForModal.is_dropout ? (<div className="bg-orange-100 text-orange-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><IconLogOut className="w-5 h-5"/> {selectedStudentForModal.dropout_reason || "Evadido"}</div>) : selectedStudentForModal.is_process_dropout ? (<div className="bg-purple-100 text-purple-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><IconClock className="w-5 h-5"/> Em Processo de Desligamento</div>) : (<>{selectedStudentForModal.needs_recuperacao && <div className="bg-red-100 text-red-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><IconXCircle className="w-5 h-5"/> Recuperação Necessária</div>}{selectedStudentForModal.needs_conselho && !selectedStudentForModal.needs_recuperacao && <div className="bg-yellow-100 text-yellow-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><IconAlertTriangle className="w-5 h-5"/> Conselho de Classe</div>}{!selectedStudentForModal.needs_recuperacao && !selectedStudentForModal.needs_conselho && <div className="bg-green-100 text-green-800 px-4 py-2 rounded-lg font-bold flex items-center gap-2"><IconCheckCircle className="w-5 h-5"/> Desenvolvimento Pleno</div>}</>)}</div>
                                    
                                    {/* SEÇÃO NOVA: APONTAMENTOS DO INSTRUTOR NO QUADRO DO ALUNO */}
                                    {instructorNotesForStudent.length > 0 && (
                                        <div className="mb-6 bg-yellow-50 rounded-xl border border-yellow-200 overflow-hidden">
                                            <div className="bg-yellow-100 px-4 py-2 border-b border-yellow-200 flex justify-between items-center">
                                                <h3 className="text-sm font-bold text-yellow-800 flex items-center gap-2"><IconBookOpen className="w-4 h-4"/> Apontamentos do Instrutor (Caderno Digital)</h3>
                                            </div>
                                            <div className="p-4 space-y-3 max-h-60 overflow-y-auto custom-scrollbar">
                                                {instructorNotesForStudent.map((note, idx) => (
                                                    <div key={idx} className="bg-white p-3 rounded-lg border border-yellow-100 shadow-sm">
                                                        <div className="flex justify-between items-start mb-1">
                                                            <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-bold uppercase">{note.instructorSource}</span>
                                                            <span className="text-xs text-gray-400">{new Date(note.date).toLocaleDateString()}</span>
                                                        </div>
                                                        <div className="font-bold text-sm text-gray-800 mb-1">{getNotebookSituationLabel(note)} <span className={`text-[10px] px-1.5 py-0.5 rounded ml-2 uppercase ${note.urgency === 'critical' ? 'bg-red-100 text-red-700' : note.urgency === 'warning' ? 'bg-orange-100 text-orange-700' : 'bg-green-100 text-green-700'}`}>{note.urgency}</span></div>
                                                        <div className="text-xs text-gray-500 mb-1">{note.scope === 'class' ? 'Turma toda' : note.studentName}</div>
                                                        <p className="text-sm text-gray-600 mb-2 whitespace-pre-wrap">{note.notes}</p>
                                                        {note.attachments && note.attachments.length > 0 && (
                                                            <div className="flex flex-wrap gap-2 pt-2 border-t border-gray-50">
                                                                {note.attachments.map((att, attIdx) => (
                                                                    <a key={attIdx} href={att.data} download={att.name} className="text-xs flex items-center gap-1 text-blue-600 hover:underline bg-blue-50 px-2 py-1 rounded"><IconPaperclip className="w-3 h-3"/> {att.name}</a>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {selectedActivitySummary && selectedActivitySummary.total > 0 && (
                                        <div className="mb-6 bg-red-50 rounded-xl border border-red-200 overflow-hidden">
                                            <div className="bg-red-100 px-4 py-2 border-b border-red-200 flex justify-between items-center">
                                                <h3 className="text-sm font-bold text-red-800 flex items-center gap-2"><IconAlertTriangle className="w-4 h-4"/> Acompanhamento de atividades</h3>
                                                <span className="text-[10px] font-bold text-red-700 uppercase">{selectedActivitySummary.completed}/{selectedActivitySummary.total} concluídas</span>
                                            </div>
                                            <div className="p-4">
                                                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-xs mb-3">
                                                    <div className="bg-white rounded-md border border-green-100 px-2 py-2 text-center"><div className="font-bold text-green-700">Concluiu</div><div className="text-base font-bold text-green-800">{selectedActivitySummary.completed}</div></div>
                                                    <div className="bg-white rounded-md border border-red-100 px-2 py-2 text-center"><div className="font-bold text-red-700">NC</div><div className="text-base font-bold text-red-800">{selectedActivitySummary.not_completed}</div></div>
                                                    <div className="bg-white rounded-md border border-gray-200 px-2 py-2 text-center"><div className="font-bold text-gray-600">Em branco</div><div className="text-base font-bold text-gray-800">{selectedActivitySummary.blank}</div></div>
                                                    <div className="bg-white rounded-md border border-yellow-100 px-2 py-2 text-center"><div className="font-bold text-yellow-700">Avaliar</div><div className="text-base font-bold text-yellow-800">{selectedActivitySummary.requires_evaluation}</div></div>
                                                </div>
                                                <div className="space-y-1.5 max-h-56 overflow-y-auto custom-scrollbar">
                                                    {selectedActivitySummary.entries.filter(entry => entry.status !== "completed").slice(0, 30).map((entry, index) => (
                                                        <div key={`${entry.sheet}-${entry.label}-${index}`} className="bg-white border border-red-100 rounded-md px-3 py-2 text-xs flex flex-col sm:flex-row sm:items-center sm:justify-between gap-1">
                                                            <span className="font-medium text-gray-700">{entry.label}</span>
                                                            <span className={`font-bold ${entry.status === 'not_completed' ? 'text-red-700' : entry.status === 'blank' ? 'text-gray-600' : 'text-yellow-700'}`}>{formatActivityStatusLabel(entry.status)} <span className="font-normal text-gray-400">({entry.sheet})</span></span>
                                                        </div>
                                                    ))}
                                                    {selectedActivitySummary.entries.filter(entry => entry.status !== "completed").length > 30 && <div className="text-[11px] text-gray-500 italic pt-1">E mais {selectedActivitySummary.entries.filter(entry => entry.status !== "completed").length - 30} pendência(s) nesta planilha.</div>}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="mb-6"><h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2"><IconBarChart2 className="w-4 h-4"/> Detalhamento por UC</h3><div className="grid grid-cols-2 sm:grid-cols-4 gap-2">{Object.entries(selectedStudentForModal.uc_scores || {}).map(([ucName, data]) => ( <div key={ucName} className={`p-2 rounded border text-center ${data.score < 0.75 ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-100'}`}><div className="text-xs font-bold text-gray-500">{ucName}</div><div className={`font-bold ${data.score < 0.75 ? 'text-red-700' : 'text-gray-800'}`}>{(data.score*100).toFixed(0)}%</div></div> ))}{Object.keys(selectedStudentForModal.uc_scores || {}).length === 0 && <span className="text-xs text-gray-400 italic col-span-4">Sem dados detalhados.</span>}</div></div>
                                    <div className="mb-6"><h3 className="text-sm font-bold text-gray-700 mb-3 flex items-center gap-2"><IconMessageSquare className="w-4 h-4"/> Diário Geral (Planilhas e Observações)</h3><div className="space-y-2 max-h-60 overflow-y-auto pr-2 custom-scrollbar">{selectedStudentForModal.all_observations && selectedStudentForModal.all_observations.length > 0 ? ( selectedStudentForModal.all_observations.map((obs, idx) => ( <div key={idx} className="bg-gray-50 border border-gray-200 p-3 rounded-lg text-sm relative hover:bg-gray-100 transition-colors"><span className={`absolute top-2 right-2 text-[10px] font-bold uppercase tracking-wider px-1 rounded ${obs.source.includes('Órion') || obs.source.includes('UC') ? 'bg-orange-100 text-orange-700' : 'bg-white text-gray-400 border border-gray-200'}`}>{obs.source}</span><p className="text-gray-700 pr-12 obs-text">{obs.text}</p></div> )) ) : ( <div className="text-center p-6 border-2 border-dashed border-gray-200 rounded-lg bg-gray-50"><p className="text-gray-400 text-sm italic">Nenhuma observação ou comentário encontrado em nenhuma aba.</p></div> )}</div></div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6"><div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><h3 className="text-sm font-bold text-gray-700 mb-2">Pendências Acadêmicas</h3><ul className="space-y-2 text-sm">{selectedStudentForModal.low_freq_ucs.length > 0 && (<li className="flex items-start gap-2 text-yellow-700"><IconAlertTriangle className="w-4 h-4 mt-0.5 shrink-0"/> <span>Baixa Frequência: <strong>{selectedStudentForModal.low_freq_ucs.join(", ")}</strong></span></li>)}{selectedStudentForModal.failed_perf_ucs.length > 0 && (<li className="flex items-start gap-2 text-red-700"><IconXCircle className="w-4 h-4 mt-0.5 shrink-0"/> <span>Dificuldade Desempenho: <strong>{selectedStudentForModal.failed_perf_ucs.join(", ")}</strong></span></li>)}{selectedStudentForModal.low_freq_ucs.length === 0 && selectedStudentForModal.failed_perf_ucs.length === 0 && (<li className="text-gray-400 italic">Nenhuma pendência registrada.</li>)}</ul></div><div className="bg-blue-50 p-4 rounded-xl border border-blue-100"><h3 className="text-sm font-bold text-blue-800 mb-2 flex items-center gap-2"><IconMessageSquare className="w-4 h-4"/> Observação Pedagógica (Principal)</h3><p className="text-sm text-blue-900 italic">{selectedStudentForModal.conselho_text || "Sem observações do conselho."}</p></div></div>
                                </div>
                                <div className="bg-gray-50 p-4 border-t border-gray-100 text-right"><button onClick={() => setSelectedStudentForModal(null)} className="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 rounded-lg font-medium transition-colors">Fechar</button></div>
                            </div>
                        </div>
                    )}
                    
                    <header className="bg-white border-b-4 border-senac-orange shadow-sm sticky top-0 z-20">
                        <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div className="flex items-center gap-4"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/86/Senac_logo.svg/500px-Senac_logo.svg.png" className="h-12 w-auto object-contain" /><div><h1 className="text-lg font-bold text-senac-blue leading-tight">Gestão de Frequência - Relatório e ATA</h1><div className="text-xs font-bold text-senac-orange uppercase mb-1 leading-tight max-w-lg">{data.course}</div><div className="flex items-center gap-2 text-xs"><span className="font-medium text-gray-500">Turma: {data.turma}</span><button onClick={() => { setData(null); setActivityTracking(null); }} className="text-senac-blue hover:underline bg-blue-50 px-2 py-0.5 rounded-full flex items-center gap-1 transition-colors"><IconRefreshCw className="w-3 h-3" /> Trocar</button><span className="text-gray-300">|</span><span className="text-gray-400">Usuário: Acesso Livre</span><button onClick={() => {if(confirm('Reiniciar sistema?')) window.location.reload()}} className="text-red-400 hover:underline flex items-center gap-1 ml-2"><IconLogOut className="w-3 h-3"/> Sair</button></div></div></div>
                            <div className="flex items-center gap-3">
